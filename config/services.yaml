services:
  _defaults:
    autowire: true
    autoconfigure: true

  Ineersa\CodingAgent\:
    resource: '../src/CodingAgent/'

  Ineersa\AgentCore\:
    resource: '../src/AgentCore/'

  Ineersa\Tui\:
    resource: '../src/Tui/'

  # ─── Hatfield config services ───

  Ineersa\CodingAgent\Config\SettingsPathResolver:
    arguments:
      $projectDir: '%kernel.project_dir%'

  Ineersa\CodingAgent\Config\AppConfigLoader: ~

  Ineersa\CodingAgent\Config\AppConfigResolver:
    arguments:
      $projectDir: '%kernel.project_dir%'
