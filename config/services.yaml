# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
parameters:
    # Temporary default model — AI-10 per-turn routing replaces this.
    app.default_model: 'deepseek/deepseek-v4-pro'

services:
  _defaults:
    autowire: true
    autoconfigure: true

  _instanceof:
    Ineersa\Tui\Listener\TuiListenerRegistrar:
      tags: ['app.tui_listener']

    Ineersa\AgentCore\Contract\Hook\BeforeProviderRequestHookInterface:
      tags: ['agent_core.before_provider_request_hook']

  Ineersa\CodingAgent\:
    resource: '../src/CodingAgent/'

  Ineersa\AgentCore\:
    resource: '../src/AgentCore/'

  Ineersa\Tui\:
    resource: '../src/Tui/'

  # ─── Symfony infrastructure (not covered by namespace autowiring) ───

  Symfony\Component\Lock\Store\FlockStore: ~
  Symfony\Component\Lock\PersistingStoreInterface:
    alias: Symfony\Component\Lock\Store\FlockStore
  Symfony\Component\Lock\LockFactory: ~
  # ─── File-backed agent-core stores ───
  # These need explicit wiring because $projectDir is a string that
  # cannot be autowired. LockFactory is autowired via the service above.

  Ineersa\AgentCore\Infrastructure\Storage\SessionRunStore:
    arguments:
      $projectDir: '%kernel.project_dir%'

  Ineersa\AgentCore\Infrastructure\Storage\SessionRunEventStore:
    arguments:
      $projectDir: '%kernel.project_dir%'

  # ─── Hatfield config services ───

  Ineersa\CodingAgent\Config\AppResourceLocator:
    arguments:
      $appRoot: '%kernel.project_dir%'

  Ineersa\CodingAgent\Config\SettingsPathResolver:
    arguments:
      $appRoot: '%kernel.project_dir%'

  Ineersa\CodingAgent\Config\HomeSettingsWriter: ~

  Ineersa\CodingAgent\Config\AppConfigLoader: ~

  # AppConfig is a value object, not an autowireable service.
  # The container uses the fromContainer() factory to construct it.
  Ineersa\CodingAgent\Config\AppConfig:
    factory: ['Ineersa\CodingAgent\Config\AppConfig', 'fromContainer']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfigLoader'
      - '@Ineersa\CodingAgent\Config\AppResourceLocator'

  Ineersa\CodingAgent\Session\HatfieldSessionStore: ~

  Ineersa\AgentCore\Infrastructure\SymfonyAi\BeforeProviderRequestSubscriber:
    arguments:
      $hooks: !tagged_iterator agent_core.before_provider_request_hook

  Ineersa\Tui\Application\InteractiveMode:
    arguments:
      $listenerRegistrars: !tagged_iterator app.tui_listener

  # ─── Transient runtime stream wiring ───

  Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink: ~

  Ineersa\CodingAgent\Runtime\Contract\RuntimeEventSinkInterface:
    alias: Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink

  # Stream observer delegates to Symfony EventDispatcher with per-delta subscribers.
  Ineersa\CodingAgent\Runtime\Stream\LlmStreamDispatchObserver:
    arguments:
      $dispatcher: '@event_dispatcher'

  Ineersa\AgentCore\Contract\Hook\LlmStreamObserverInterface:
    alias: Ineersa\CodingAgent\Runtime\Stream\LlmStreamDispatchObserver

  # The mapper now dispatches through the shared Symfony dispatcher
  # so mapping subscribers (registered via autoconfigure) receive events.
  Ineersa\CodingAgent\Runtime\Protocol\RuntimeEventMapper:
    arguments:
      $dispatcher: '@event_dispatcher'

  # ─── Symfony AI Platform wiring ───
  # PlatformInterface reads Hatfield config from autowired AppConfig,
  # so no explicit arguments are needed here.

  Symfony\AI\Platform\PlatformInterface:
    factory: ['@Ineersa\CodingAgent\Infrastructure\SymfonyAi\ConfiguredSymfonyAiPlatformFactory', 'createPlatform']

  # Default model binding (fallback when no resolver or no session context).
  Ineersa\AgentCore\Application\Handler\ExecuteLlmStepWorker:
    arguments:
      $defaultModel: '%app.default_model%'

  # ─── AI-10 Per-turn model/reasoning routing ───

  Ineersa\CodingAgent\Config\SessionAwareModelResolver: ~

  Ineersa\AgentCore\Contract\Model\ModelResolverInterface:
    alias: Ineersa\CodingAgent\Config\SessionAwareModelResolver

  Ineersa\CodingAgent\Infrastructure\SymfonyAi\SymfonyAiProviderRegistry: ~

  Ineersa\AgentCore\Contract\Model\ProviderRegistryInterface:
    alias: Ineersa\CodingAgent\Infrastructure\SymfonyAi\SymfonyAiProviderRegistry

  Ineersa\AgentCore\Infrastructure\SymfonyAi\ModelResolverRoutingSubscriber:
    arguments:
      $modelResolver: '@Ineersa\AgentCore\Contract\Model\ModelResolverInterface'
      $providerRegistry: '@Ineersa\AgentCore\Contract\Model\ProviderRegistryInterface'
