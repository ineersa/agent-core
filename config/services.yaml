# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
parameters:
    # Legacy placeholder — model selection comes from Hatfield settings
    # (ai.default_model) or the first available configured model.
    # SessionAwareModelResolver overrides this via ModelResolverRoutingSubscriber.
    app.default_model: ''

    # Default HATFIELD_CAPTURE_ERRORS to enabled; overridable via env var.
    env(HATFIELD_CAPTURE_ERRORS): '1'

    # app.capture_errors resolves the env var as a boolean.
    # Services read this parameter — not the raw env directly.
    app.capture_errors: '%env(bool:HATFIELD_CAPTURE_ERRORS)%'

    # Default session ID for background process completion polling.
    # Empty means unscoped (operates across all sessions) in
    # non-controller or test environments. HeadlessController sets
    # HATFIELD_SESSION_ID to the actual run ID so the poller scopes
    # its queries and avoids O(N) cross-session filesystem scans.
    env(HATFIELD_SESSION_ID): ''

    # Single source of truth for the file mention completion index path.
    # Built from %app.cwd% so it respects --cwd.  Injected into
    # FileMentionIndexReader and CompletionFileIndexRefreshCommand
    # to avoid path duplication.
    app.file_mention_index_path: '%app.cwd%/.hatfield/cache/file-mentions/index.jsonl'

services:
  _defaults:
    autowire: true
    autoconfigure: true

  _instanceof:
    Ineersa\Tui\Listener\TuiListenerRegistrar:
      tags: ['app.tui_listener']

    Ineersa\AgentCore\Contract\Hook\BeforeProviderRequestHookInterface:
      tags: ['agent_core.before_provider_request_hook']

    Ineersa\AgentCore\Contract\Tool\ToolResultProcessorInterface:
      tags: ['agent_core.tool_result_processor']

    Ineersa\AgentCore\Application\Pipeline\RunMessageHandler:
      tags: ['agent_core.run_message_handler']

    Ineersa\AgentCore\Contract\Extension\CommandHandlerInterface:
      tags: ['agent_core.command_handler']

    Ineersa\AgentCore\Contract\Extension\HookSubscriberInterface:
      tags: ['agent_core.hook_subscriber']

    Ineersa\AgentCore\Contract\Hook\TransformContextHookInterface:
      tags: ['agent_core.transform_context_hook']

    Ineersa\AgentCore\Contract\Hook\ConvertToLlmHookInterface:
      tags: ['agent_core.convert_to_llm_hook']

    Ineersa\CodingAgent\Compaction\BeforeCompactionHookInterface:
      tags: ['coding_agent.before_compaction_hook']

    # Built-in tool providers are auto-collected by ToolRegistry
    # for permanent registration during registry construction.
    Ineersa\CodingAgent\Tool\HatfieldToolProviderInterface:
      tags: ['hatfield.tool_provider']

  Ineersa\CodingAgent\:
    resource: '%kernel.project_dir%/src/CodingAgent/**/*.php'
    exclude: '%kernel.project_dir%/src/CodingAgent/ExtensionApi/**/*.php'

  Ineersa\AgentCore\:
    resource: '%kernel.project_dir%/src/AgentCore/**/*.php'

  Ineersa\Tui\:
    resource: '%kernel.project_dir%/src/Tui/**/*.php'

  # ─── Session stores — resolved via HatfieldSessionStore for path ───

  Ineersa\AgentCore\Contract\IdempotencyStoreInterface:
    alias: Ineersa\CodingAgent\Session\JsonlIdempotencyStore

  # ─── Error capture (env-driven config, not a per-catch delegation service) ───

  Ineersa\CodingAgent\Runtime\Contract\RuntimeErrorCaptureConfig:
    arguments:
      $captureErrors: '%app.capture_errors%'

  # ─── Hatfield config services ───

  Ineersa\CodingAgent\Config\AppResourceLocator:
    arguments:
      $appRoot: '%kernel.project_dir%'

  Ineersa\CodingAgent\Config\SettingsPathResolver:
    arguments:
      $appRoot: '%kernel.project_dir%'

  # CodexAuthStorage is a service, not just a value object — it needs
  # the home directory resolved from SettingsPathResolver and a LockFactory.
  # Autowiring fails for the string $homeDir parameter.
  Ineersa\CodingAgent\Auth\CodexAuthStorage:
    arguments:
      $homeDir: '@=service("Ineersa\\CodingAgent\\Config\\SettingsPathResolver").getHomeDir()'

  # AppConfig is a value object, not an autowireable service.
  # The container uses the fromContainer() factory to construct it.
  # Canonical runtime cwd is injected from %app.cwd% rather than relying
  # on ambient getcwd(), ensuring all config services use the same canonical
  # runtime working directory (resolved from HATFIELD_CWD or kernel.project_dir).
  Ineersa\CodingAgent\Config\AppConfig:
    factory: ['Ineersa\CodingAgent\Config\AppConfig', 'fromContainer']
    arguments:
      $loader: '@Ineersa\CodingAgent\Config\AppConfigLoader'
      $resources: '@Ineersa\CodingAgent\Config\AppResourceLocator'
      $denormalizer: '@Symfony\Component\Serializer\SerializerInterface'
      $cwd: '%app.cwd%'

  Ineersa\CodingAgent\Config\CompactionConfig:
    factory: ['Ineersa\CodingAgent\Config\CompactionConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  # ─── Prompt Templates ───

  Ineersa\CodingAgent\Config\PromptsConfig:
    factory: ['Ineersa\CodingAgent\Config\PromptsConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  Ineersa\CodingAgent\PromptTemplate\PromptTemplatesRuntimeConfig: ~

  # ─── Agent Definitions ───

  Ineersa\CodingAgent\Config\AgentsConfig:
    factory: ['Ineersa\CodingAgent\Config\AgentsConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  Ineersa\CodingAgent\Agent\Definition\AgentDefinitionDiscovery:
    arguments:
      $cwd: '%app.cwd%'

  Ineersa\CodingAgent\Agent\Definition\AgentDefinitionCatalog:
    factory: ['@Ineersa\CodingAgent\Agent\Definition\AgentDefinitionDiscovery', 'discover']

  Ineersa\CodingAgent\PromptTemplate\PromptTemplateLoader:
    arguments:
      $promptsConfig: '@Ineersa\CodingAgent\Config\PromptsConfig'
      $runtimeConfig: '@Ineersa\CodingAgent\PromptTemplate\PromptTemplatesRuntimeConfig'
      $cwd: '%app.cwd%'

  Ineersa\CodingAgent\Runtime\Contract\PromptTemplateCatalogInterface:
    alias: Ineersa\CodingAgent\PromptTemplate\PromptTemplateService

  # ─── Extension wiring ───

  Ineersa\CodingAgent\Extension\ExtensionExecBridge: ~

  Ineersa\Tui\Extension\TuiCommandRegistryAdapter:
    arguments:
      $slashCommandRegistry: '@Ineersa\Tui\Command\SlashCommandRegistry'

  Ineersa\Hatfield\ExtensionApi\Command\CommandRegistryInterface:
    alias: Ineersa\Tui\Extension\TuiCommandRegistryAdapter

  Ineersa\CodingAgent\Extension\ExtensionToolRegistryBridge:
    arguments:
      $appConfig: '@Ineersa\CodingAgent\Config\AppConfig'
      $execBridge: '@Ineersa\CodingAgent\Extension\ExtensionExecBridge'
      $commandRegistry: '@Ineersa\Hatfield\ExtensionApi\Command\CommandRegistryInterface'

  Ineersa\Hatfield\ExtensionApi\ExtensionApiInterface:
    alias: Ineersa\CodingAgent\Extension\ExtensionToolRegistryBridge

  Ineersa\CodingAgent\Extension\ExtensionToolHookEventSubscriber:
    arguments:
      $cwd: '@=service("Ineersa\\CodingAgent\\Config\\AppConfig").cwd'
      $logger: '@monolog.logger'

  Ineersa\CodingAgent\Extension\ExtensionHookRegistry: ~

  Ineersa\CodingAgent\Extension\ExtensionManager:
    arguments:
      $extensionApi: '@Ineersa\Hatfield\ExtensionApi\ExtensionApiInterface'

  # LoggingConfig is derived from AppConfig and autowireable.
  Ineersa\CodingAgent\Config\LoggingConfig:
    factory: ['Ineersa\CodingAgent\Config\LoggingConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  # Monolog processor — injects RunLogContext fields into every log record.
  Ineersa\CodingAgent\Logging\LogContextProcessor:
    tags:
      - { name: monolog.processor }

  # OutputCapConfig is derived from AppConfig and autowireable.
  Ineersa\CodingAgent\Config\OutputCapConfig:
    factory: ['Ineersa\CodingAgent\Config\OutputCapConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  # ImageToolConfig is derived from AppConfig and autowireable.
  Ineersa\CodingAgent\Config\ImageToolConfig:
    factory: ['Ineersa\CodingAgent\Config\ImageToolConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  # BackgroundProcessConfig is derived from AppConfig and autowireable.
  Ineersa\CodingAgent\Config\BackgroundProcessConfig:
    factory: ['Ineersa\CodingAgent\Config\BackgroundProcessConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'


  # BashToolConfig is derived from AppConfig and autowireable.
  Ineersa\CodingAgent\Config\BashToolConfig:
    factory: ['Ineersa\CodingAgent\Config\BashToolConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  # BashTool — TOOLS-09 registry-backed bash execution with foreground supervision.
  # TOOLS-09B overrides the prompt adapter to RuntimeBashBackgroundPromptAdapter,
  # which routes background confirmations through the TUI question system.
  Ineersa\CodingAgent\Tool\BashTool:
    arguments:
      $promptAdapter: '@Ineersa\CodingAgent\Tool\ToolQuestion\RuntimeBashBackgroundPromptAdapter'

  # Tool question store — cross-process pending tool question persistence.
  Ineersa\CodingAgent\Tool\ToolQuestion\ToolQuestionStore: ~

  # Runtime bash background prompt adapter — production TUI bridge.
  Ineersa\CodingAgent\Tool\ToolQuestion\RuntimeBashBackgroundPromptAdapter: ~

  # Background process status checker for adapter poll loop.
  Ineersa\CodingAgent\Tool\ToolQuestion\BackgroundProcessStatusCheckerInterface:
    alias: Ineersa\CodingAgent\Tool\ToolQuestion\BackgroundProcessStatusChecker

  # Autowire the tool question store interface.
  Ineersa\CodingAgent\Tool\ToolQuestion\ToolQuestionStoreInterface:
    alias: Ineersa\CodingAgent\Tool\ToolQuestion\ToolQuestionStore

  # Controller command handler for tool question answers.
  Ineersa\CodingAgent\Runtime\Controller\CommandHandler\AnswerToolQuestionHandler: ~

  # BackgroundProcess store — uses Doctrine ORM EntityManager,
  # no custom normalizer. Schema is managed by Doctrine migrations.
  # ProcessStore and ProcessLifecycle are autowired by Symfony DI.
  Ineersa\CodingAgent\Tool\BackgroundProcessManager:
    arguments:
      $store: '@Ineersa\CodingAgent\Tool\BackgroundProcess\ProcessStore'
      $lifecycle: '@Ineersa\CodingAgent\Tool\BackgroundProcess\ProcessLifecycle'
      $config: '@Ineersa\CodingAgent\Config\BackgroundProcessConfig'
    calls:
      - registerShutdownHandler: []

  # Startup database migrator — runs known migration classes at startup via DBAL.
  # Uses the app-owned ApplicationMigrationExecutor instead of the Symfony
  # doctrine:migrations:migrate console command to avoid phar:// filesystem
  # scanning issues inside the PHAR. Dev doctrine:migrations commands are
  # still available from the source checkout.
  Ineersa\CodingAgent\Migrations\StartupDatabaseMigrator:
    arguments:
      $executor: '@Ineersa\CodingAgent\Migrations\ApplicationMigrationExecutor'

  # HatfieldModelCatalog — build from AppConfig.ai so all consumers share the
  # same catalog populated from settings, not an auto-wired empty default.
  # AiCostCalculator, CodingAgentImageCapabilityChecker, and any future
  # catalog consumer must use this definition instead of autowiring.
  Ineersa\CodingAgent\Config\Ai\HatfieldModelCatalog:
    arguments:
      $config: '@=service("Ineersa\\CodingAgent\\Config\\AppConfig").ai'

  # CodingAgentImageCapabilityChecker — wraps HatfieldModelCatalog from AppConfig.
  Ineersa\CodingAgent\Tool\ImageProcessing\CodingAgentImageCapabilityChecker:
    factory: ['Ineersa\CodingAgent\Tool\ImageProcessing\CodingAgentImageCapabilityChecker', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  Ineersa\AgentCore\Contract\Model\ImageCapabilityCheckerInterface:
    alias: Ineersa\CodingAgent\Tool\ImageProcessing\CodingAgentImageCapabilityChecker

  # ── Provider compatibility feature shapers (AgentCore) ──
  # CodingAgent resolves compat features and reasoning options from its catalog
  # and passes them to AgentCore as a simple array. AgentCore's shapers consume
  # that array — no catalog access, no DTOs, no resolver interfaces.

  Ineersa\AgentCore\Infrastructure\SymfonyAi\ReasoningOptionsFeatureShaper:
    tags:
      - { name: 'agent_core.provider_compatibility_feature_shaper' }

  Ineersa\AgentCore\Infrastructure\SymfonyAi\ReasoningContentFeatureShaper:
    tags:
      - { name: 'agent_core.provider_compatibility_feature_shaper' }

  Ineersa\AgentCore\Infrastructure\SymfonyAi\ZaiToolStreamFeatureShaper:
    tags:
      - { name: 'agent_core.provider_compatibility_feature_shaper' }

  Ineersa\AgentCore\Infrastructure\SymfonyAi\ProviderCompatibilityRequestShaper:
    arguments:
      $featureShapers: !tagged_iterator agent_core.provider_compatibility_feature_shaper

  Ineersa\AgentCore\Infrastructure\SymfonyAi\BeforeProviderRequestSubscriber:
    arguments:
      $hooks: !tagged_iterator agent_core.before_provider_request_hook

  Ineersa\Tui\Application\InteractiveMode:
    arguments:
      $listenerRegistrars: !tagged_iterator { tag: app.tui_listener, default_priority_method: getPriority }

  # ─── Runtime stream wiring ───

  Ineersa\CodingAgent\Runtime\Contract\RuntimeEventSinkInterface:
    alias: Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink

  # Stream subscribers: autowiring cannot resolve RuntimeEventSinkInterface
  # because there are two implementations (in-process and STDOUT). Explicitly
  # wire the in-process sink as $sink and the STDOUT sink as $stdoutSink.
  Ineersa\CodingAgent\Runtime\Stream\AssistantTextStreamSubscriber:
    arguments:
      $sink: '@Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink'
      $stdoutSink: '@Ineersa\CodingAgent\Runtime\Stream\StdoutRuntimeEventSink'

  Ineersa\CodingAgent\Runtime\Stream\AssistantThinkingStreamSubscriber:
    arguments:
      $sink: '@Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink'
      $stdoutSink: '@Ineersa\CodingAgent\Runtime\Stream\StdoutRuntimeEventSink'

  Ineersa\CodingAgent\Runtime\Stream\ToolCallStreamSubscriber:
    arguments:
      $sink: '@Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink'
      $stdoutSink: '@Ineersa\CodingAgent\Runtime\Stream\StdoutRuntimeEventSink'

  # ─── App executable locator chain ───
  # Resolves the agent binary independently of the runtime working directory,
  # so messenger consumers and controller subprocesses always use the correct
  # binary regardless of --cwd or Hatfield project CWD.
  #
  # Ordered fallback:
  #   1. ConfigExecutableLocator — HATFIELD_BINARY_PATH env override
  #   2. PharExecutableLocator — current PHAR self-reference
  #   3. SourceTreeExecutableLocator — source checkout with bin/console
  Ineersa\CodingAgent\Runtime\Process\ConfigExecutableLocator:
    arguments:
      $runtimeCwd: '%app.cwd%'

  Ineersa\CodingAgent\Runtime\Process\PharExecutableLocator: ~

  Ineersa\CodingAgent\Runtime\Process\SourceTreeExecutableLocator:
    arguments:
      $projectDir: '%kernel.project_dir%'

  Ineersa\CodingAgent\Runtime\Process\ChainExecutableLocator:
    class: Ineersa\CodingAgent\Runtime\Process\ChainExecutableLocator
    arguments:
      - '@Ineersa\CodingAgent\Runtime\Process\ConfigExecutableLocator'
      - '@Ineersa\CodingAgent\Runtime\Process\PharExecutableLocator'
      - '@Ineersa\CodingAgent\Runtime\Process\SourceTreeExecutableLocator'

  Ineersa\CodingAgent\Runtime\Process\AppExecutableLocator:
    alias: Ineersa\CodingAgent\Runtime\Process\ChainExecutableLocator

  # Centralized runtime process context for subprocess spawning.
  # Injected into JsonlProcessAgentSessionClient and ConsumerSupervisor.
  Ineersa\CodingAgent\Runtime\Process\RuntimeProcessConfig:
    arguments:
      $executableLocator: '@Ineersa\CodingAgent\Runtime\Process\AppExecutableLocator'
      $runtimeCwd: '%app.cwd%'

  # ─── Controller event loop ───

  # Command handlers (ControllerCommandEvent listeners) receive the
  # in-process client so they can dispatch commands to the run_control,
  # llm, and tool transports without spawning subprocesses.
  #
  # Controller command handlers type-hint against the AgentSessionClient
  # interface so they remain testable with test spies (InProcessAgentSessionClient
  # is final and cannot be mocked). The concrete implementation calls
  # agent-core services directly in-process.
  Ineersa\CodingAgent\Runtime\Contract\AgentSessionClient:
    alias: 'Ineersa\CodingAgent\Runtime\InProcess\InProcessAgentSessionClient'

  # ShellCommandHandler dispatches ExecuteShellToolCall messages on the
  # agent.execution.bus (not the default agent.command.bus) so that shell
  # command tool execution runs in the tool consumer process (issue #183).
  Ineersa\CodingAgent\Runtime\Controller\CommandHandler\ShellCommandHandler:
    arguments:
      $executionBus: '@agent.execution.bus'

  Ineersa\CodingAgent\Runtime\Controller\RuntimeEventEmitter:
    arguments:
      $eventClient: '@Ineersa\CodingAgent\Runtime\InProcess\InProcessAgentSessionClient'

  Ineersa\CodingAgent\Runtime\Controller\HeadlessController:
    arguments:
      $dispatcher: '@event_dispatcher'

  Ineersa\CodingAgent\Runtime\Controller\BackgroundProcessCompletionPoller:
    arguments:
      # Session scoping prevents O(N) cross-session filesystem scans.
      # Null/unset means unscoped (all processes), set = scoped to one run.
      $sessionId: '%env(HATFIELD_SESSION_ID)%'

  # Stream observer delegates to Symfony EventDispatcher with per-delta subscribers.
  Ineersa\CodingAgent\Runtime\Stream\LlmStreamDispatchObserver:
    arguments:
      $dispatcher: '@event_dispatcher'

  Ineersa\AgentCore\Contract\Hook\LlmStreamObserverInterface:
    alias: Ineersa\CodingAgent\Runtime\Stream\LlmStreamDispatchObserver

  # RuntimeEventMapper uses RuntimeEventTranslator with an explicit dispatch table.
  # EventDispatcher is still passed for extension subscribers that observe the
  # mapping flow (agent_command_applied, HITL routing, tool_question dispatch).
  Ineersa\CodingAgent\Runtime\Protocol\RuntimeEventTranslator:
    arguments:
      $eventDispatcher: '@event_dispatcher'

  Ineersa\CodingAgent\Runtime\Contract\TranscriptProjectorInterface:
    alias: Ineersa\CodingAgent\Runtime\ProjectionPipeline\TranscriptProjector

  # ─── Symfony AI Platform wiring ───
  # PlatformInterface reads Hatfield config from autowired AppConfig,
  # so no explicit arguments are needed here.

  # Explicit service definition for the platform factory so the DI container
  # can resolve the service ID during compilation. The class is also
  # auto-registered by the resource import, but the explicit definition
  # guarantees it survives when the PHAR resource path uses wildcard
  # patterns (phar:// paths require **/*.php globs for reliable Symfony DI
  # service discovery — bare directory paths register 0 services).
  Ineersa\CodingAgent\Infrastructure\SymfonyAi\ConfiguredSymfonyAiPlatformFactory: ~

  Symfony\AI\Platform\PlatformInterface:
    factory: ['@Ineersa\CodingAgent\Infrastructure\SymfonyAi\ConfiguredSymfonyAiPlatformFactory', 'createPlatform']

  # Default model binding (fallback when no resolver or no session context).
  Ineersa\AgentCore\Application\Handler\ExecuteLlmStepWorker:
    arguments:
      $defaultModel: '%app.default_model%'

  # ─── System prompt builder ───
  Symfony\AI\Platform\Message\TemplateRenderer\StringTemplateRenderer: ~

  Ineersa\CodingAgent\SystemPrompt\SystemPromptBuilder:
    arguments:
      $projectDir: '%kernel.project_dir%'
      $promptContributorProvider: '@Ineersa\CodingAgent\Extension\ExtensionHookRegistry'

  # ─── Compaction prompt builder ───
  Ineersa\CodingAgent\Compaction\CompactionPromptBuilder:
    arguments:
      $projectDir: '%kernel.project_dir%'

  # ─── Compaction pipeline (COMP-02) ───

  # Compaction service: CodingAgent adapter implementing the AgentCore contract.
  # Autowiring resolves SessionCompactor and CompactionConfig; the interface
  # alias lets AgentCore pipeline code depend on the contract.
  Ineersa\CodingAgent\Compaction\CompactionService: ~

  Ineersa\AgentCore\Contract\Compaction\CompactionServiceInterface:
    alias: Ineersa\CodingAgent\Compaction\CompactionService

  # Compaction worker: async model invocation for summarization.
  # @see ExecuteLlmStepWorker for the parallel LLM-step pattern.
  # $commandBus is explicitly bound to agent.command.bus so the worker
  # dispatches CompactionStepResult back to the orchestrator within the
  # same consumer process.
  Ineersa\AgentCore\Application\Handler\ExecuteCompactionStepWorker:
    arguments:
      $commandBus: '@agent.command.bus'

  # ─── Compaction auto-trigger (COMP-06) ───

  # Active model resolver: thin abstraction over ModelSelectionService
  # so compaction services can be tested without the full model-selection
  # dependency tree.
  Ineersa\CodingAgent\Compaction\ModelSelectionActiveModelResolver: ~

  Ineersa\CodingAgent\Compaction\ActiveModelResolverInterface:
    alias: Ineersa\CodingAgent\Compaction\ModelSelectionActiveModelResolver

  # Provider context usage resolver — reads latest llm_step_completed usage
  # from committed events for auto-compaction trigger policy.
  Ineersa\CodingAgent\Compaction\ProviderContextUsageResolver: ~

  # Pre-LLM guard: CodingAgent implementation of the AgentCore contract.
  # Injected into AdvanceRunHandler (AgentCore) so AgentCore can check
  # auto-compaction policy without depending on CodingAgent internals.
  Ineersa\CodingAgent\Compaction\CodingAgentPreLlmCompactionGuard: ~

  Ineersa\AgentCore\Contract\Compaction\PreLlmCompactionGuardInterface:
    alias: Ineersa\CodingAgent\Compaction\CodingAgentPreLlmCompactionGuard

  # Auto-compaction after-turn hook subscriber.
  # Tagged automatically via _instanceof HookSubscriberInterface.
  # $commandBus is bound to agent.command.bus so CompactRun dispatch
  # targets the correct bus.
  Ineersa\CodingAgent\Compaction\AutoCompactionHookSubscriber:
    arguments:
      $commandBus: '@agent.command.bus'

  # ToolRegistry — concrete CodingAgent registry for permanent/dynamic tools.
  # Tagged built-in providers are seeded during registry construction.
  Ineersa\CodingAgent\Tool\ToolRegistry:
    arguments:
      $providers: !tagged_iterator hatfield.tool_provider

  Ineersa\CodingAgent\Tool\ToolRegistryInterface:
    alias: Ineersa\CodingAgent\Tool\ToolRegistry

  # CodingAgent ToolSetResolver — bridges ToolRegistry to AgentCore resolver seam.
  # The inner resolver (CodingAgentToolSetResolver) is wrapped by
  # McpCatalogRegisteringToolSetResolver so MCP dynamic tools from the
  # session catalog are registered before the active tool snapshot is built.
  Ineersa\CodingAgent\Tool\CodingAgentToolSetResolver:
    arguments:
      $toolRegistry: '@Ineersa\CodingAgent\Tool\ToolRegistryInterface'

  # MCP-aware wrapper: calls registrar before delegate so LLM-visible
  # tool schemas and execution allowlists include catalog-backed MCP tools.
  Ineersa\CodingAgent\Mcp\Tool\McpCatalogRegisteringToolSetResolver:
    arguments:
      $inner: '@Ineersa\CodingAgent\Tool\CodingAgentToolSetResolver'
      $mcpToolRegistrar: '@Ineersa\CodingAgent\Mcp\Tool\McpToolRegistrar'
      $logger: '@logger'
  Ineersa\AgentCore\Contract\Tool\ToolSetResolverInterface:
    alias: Ineersa\CodingAgent\Mcp\Tool\McpCatalogRegisteringToolSetResolver

  # RegistryBackedToolbox — reads ToolRegistry definitions and exposes them through
  # the Symfony AI ToolboxInterface so the existing Execution pipeline can invoke
  # registered handlers (permanent, dynamic, and extension-registered tools).
  Ineersa\CodingAgent\Tool\RegistryBackedToolbox:
    arguments:
      $registry: '@Ineersa\CodingAgent\Tool\ToolRegistryInterface'
      $eventDispatcher: '@event_dispatcher'
      $rewriteHookProvider: '@Ineersa\CodingAgent\Extension\ExtensionHookRegistry'

  Symfony\AI\Agent\Toolbox\ToolboxInterface:
    alias: Ineersa\CodingAgent\Tool\RegistryBackedToolbox

  # ─── TOOLS-00 Tool cancellation context bridge ───

  # ToolSettings resolves tools.execution defaults from typed AppConfig DTOs.
  Ineersa\CodingAgent\Config\ToolSettings:
    factory: ['Ineersa\CodingAgent\Config\ToolSettings', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  Ineersa\AgentCore\Contract\Tool\ToolExecutionSettingsInterface:
    alias: Ineersa\CodingAgent\Config\ToolSettings

  # Tool executor wiring: read execution defaults from merged Hatfield settings.
  # The toolbox wires to RegistryBackedToolbox; toolSetResolver to CodingAgentToolSetResolver.
  # Execution mode per tool is set at registration time by the tool author/provider
  # in ToolDefinitionDTO, not from settings overrides.
  Ineersa\AgentCore\Application\Handler\ToolExecutor:
    factory: ['Ineersa\AgentCore\Application\Handler\ToolExecutor', 'fromSettings']
    arguments:
      $settings: '@Ineersa\AgentCore\Contract\Tool\ToolExecutionSettingsInterface'
      $toolbox: '@Symfony\AI\Agent\Toolbox\ToolboxInterface'
      $contextAccessor: '@Ineersa\AgentCore\Application\Tool\StackToolExecutionContextAccessor'
      $toolSetResolver: '@Ineersa\AgentCore\Contract\Tool\ToolSetResolverInterface'
      $toolResultProcessors: !tagged_iterator agent_core.tool_result_processor
  # Durable tool batch store — persists batch state across consumer restarts.
  # Uses Doctrine ORM entities/repositories against the shared messenger SQLite.
  Ineersa\AgentCore\Contract\Tool\ToolBatchStoreInterface:
    alias: Ineersa\CodingAgent\Tool\Store\DbalToolBatchStore

  # ─── AI-10 Per-turn model/reasoning routing ───

  Ineersa\AgentCore\Contract\Model\ModelResolverInterface:
    alias: Ineersa\CodingAgent\Config\SessionAwareModelResolver

  Ineersa\AgentCore\Contract\Model\ProviderRegistryInterface:
    alias: Ineersa\CodingAgent\Infrastructure\SymfonyAi\SymfonyAiProviderRegistry

  Ineersa\AgentCore\Infrastructure\SymfonyAi\ModelResolverRoutingSubscriber:
    arguments:
      $modelResolver: '@Ineersa\AgentCore\Contract\Model\ModelResolverInterface'
      $providerRegistry: '@Ineersa\AgentCore\Contract\Model\ProviderRegistryInterface'

  # ─── AgentCore pipeline wiring (services that need tagged iterators or scalar binding) ───

  Ineersa\AgentCore\Application\Pipeline\RunMessageProcessor:
    arguments:
      $handlers: !tagged_iterator agent_core.run_message_handler
      $runStateReplayService: '@Ineersa\AgentCore\Application\Handler\RunStateReplayService'

  Ineersa\AgentCore\Application\Handler\StepDispatcher:
    arguments:
      $executionBus: '@agent.execution.bus'

  Ineersa\AgentCore\Application\Handler\CommandHandlerRegistry:
    arguments:
      $handlers: !tagged_iterator agent_core.command_handler

  Ineersa\AgentCore\Application\Handler\HookSubscriberRegistry:
    arguments:
      $subscribers: !tagged_iterator agent_core.hook_subscriber

  Ineersa\CodingAgent\Compaction\CompactionHookDispatcher:
    arguments:
      $hooks: !tagged_iterator coding_agent.before_compaction_hook

  # LlmPlatformAdapter hooks — ImageGatingConvertHook registers as a convert_to_llm hook.
  Ineersa\AgentCore\Infrastructure\SymfonyAi\LlmPlatformAdapter:
    arguments:
      $transformContextHooks: !tagged_iterator agent_core.transform_context_hook
      $convertToLlmHooks: !tagged_iterator agent_core.convert_to_llm_hook
      $costCalculator: '@Ineersa\CodingAgent\Config\Ai\AiCostCalculator'
      $modelResolver: '@Ineersa\AgentCore\Contract\Model\ModelResolverInterface'

  Ineersa\AgentCore\Contract\Model\PlatformInterface:
    alias: Ineersa\AgentCore\Infrastructure\SymfonyAi\LlmPlatformAdapter

  Ineersa\AgentCore\Domain\Model\CostCalculatorInterface:
    alias: Ineersa\CodingAgent\Config\Ai\AiCostCalculator

  # ─── Completion providers ────────────────────────────────────
  # CompletionProvider implementations are auto-tagged for the
  # composite registry.  Priority order: slash commands before
  # file mentions so leading "/" doesn't trigger both providers.

  Ineersa\Tui\Completion\SlashCommandCompletionProvider:
    tags:
      - { name: 'app.completion_provider', priority: 100 }

  Ineersa\Tui\Completion\SessionIdCompletionProvider:
    tags:
      - { name: 'app.completion_provider', priority: 95 }

  Ineersa\Tui\Completion\FileMentionCompletionProvider:
    tags:
      - { name: 'app.completion_provider', priority: 90 }

  Ineersa\Tui\Completion\FileMentionIndexReader:
    arguments:
      $indexPath: '%app.file_mention_index_path%'

  # Composite provider aggregates all tagged CompletionProvider
  # implementations.  CompletionListener depends on CompletionProvider
  # (not a concrete type), so DI resolves this composite.
  Ineersa\Tui\Completion\CompletionProviderRegistry:
    arguments:
      $providers: !tagged_iterator app.completion_provider

  Ineersa\Tui\Completion\CompletionProvider:
    alias: Ineersa\Tui\Completion\CompletionProviderRegistry

  # CLI command for file mention index refresh.
  # Recurrently invoked by Symfony Scheduler via #[AsPeriodicTask].
  # Its non-autowire-able string parameters are resolved from
  # container parameters — no path duplication across config/code.
  Ineersa\CodingAgent\CLI\CompletionFileIndexRefreshCommand: ~

  # File mention index builder — shared by the console command and
  # the startup listener.  Not autowireable (string constructor args
  # for cwd and index path).
  Ineersa\CodingAgent\CLI\FileMentionIndexBuilder:
    arguments:
      $cwd: '%app.cwd%'
      $indexPath: '%app.file_mention_index_path%'

  # Synchronous startup index build so @ completion works before the
  # first Scheduler cycle (periodic tasks fire at now + period).
  Ineersa\CodingAgent\CLI\FileMentionIndexStartupListener:

  # ─── MCP Client (Phases 0-3) ───────────────────────────────────

  # Config loader — needs explicit scalar $projectCwd binding
  # because Symfony DI cannot autowire plain strings.
  Ineersa\CodingAgent\Mcp\Config\McpConfigLoader:
    arguments:
      $projectCwd: '%app.cwd%'

  # MCP session lifecycle dispatcher — injects the command bus
  # explicitly (not autowired to agent.execution.bus).
  Ineersa\CodingAgent\Mcp\McpSessionLifecycleDispatcher:
    arguments:
      $commandBus: '@agent.command.bus'

  # MCP lifecycle message handler is auto-discovered via #[AsMessageHandler]
  # and autowired.  McpConnectionManagerInterface is resolved via the
  # alias above; McpToolNameMapper autowires; only McpToolCatalogStoreInterface
  # needs explicit wiring (SessionFileMcpToolCatalogStore with projectCwd).
  Ineersa\CodingAgent\Mcp\Handler\McpInitializeSessionHandler:
    arguments:
      $catalogStore: '@Ineersa\CodingAgent\Mcp\Catalog\SessionFileMcpToolCatalogStore'

  ## MCP connection manager (broker-owned, one client per run/server)
  Ineersa\CodingAgent\Mcp\Client\McpConnectionManager: ~

  # Alias the interface so handlers depend on the abstraction.
  Ineersa\CodingAgent\Mcp\Client\McpConnectionManagerInterface:
    alias: Ineersa\CodingAgent\Mcp\Client\McpConnectionManager
  ## MCP SDK client factory
  Ineersa\CodingAgent\Mcp\Client\McpSdkClientFactory: ~

  ## MCP tool name mapper
  Ineersa\CodingAgent\Mcp\Catalog\McpToolNameMapper: ~

  ## MCP session-file catalog store — needs explicit $projectCwd
  Ineersa\CodingAgent\Mcp\Catalog\SessionFileMcpToolCatalogStore:
    arguments:
      $projectCwd: '%app.cwd%'

  # Inject MCP lifecycle dispatcher into the session client so
  # start/resume both trigger MCP initialize.
  Ineersa\CodingAgent\Runtime\InProcess\InProcessAgentSessionClient:
    arguments:
      $mcpDispatcher: '@Ineersa\CodingAgent\Mcp\McpSessionLifecycleDispatcher'

  # ─── MCP-04 / MCP-05 Dynamic MCP tool registration + invocation ────

  # MCP tool catalog store interface — alias for the session-file implementation.
  Ineersa\CodingAgent\Mcp\Catalog\McpToolCatalogStoreInterface:
    alias: Ineersa\CodingAgent\Mcp\Catalog\SessionFileMcpToolCatalogStore

  # MCP result mapper — maps raw MCP callTool results to tool output / ToolCallException.
  Ineersa\CodingAgent\Mcp\Tool\McpResultMapper: ~

  # MCP tool invoker — autowired shared runtime that owns the real invocation work.
  Ineersa\CodingAgent\Mcp\Tool\McpToolInvoker: ~

  # MCP tool handler factory — creates per-tool handler instances with static identity.
  Ineersa\CodingAgent\Mcp\Tool\McpToolHandlerFactory: ~

  # MCP tool registrar — bridges session catalog into ToolRegistry dynamic tools.
  Ineersa\CodingAgent\Mcp\Tool\McpToolRegistrar:
    arguments:
      $catalogStore: '@Ineersa\CodingAgent\Mcp\Catalog\McpToolCatalogStoreInterface'
      $toolRegistry: '@Ineersa\CodingAgent\Tool\ToolRegistryInterface'
      $handlerFactory: '@Ineersa\CodingAgent\Mcp\Tool\McpToolHandlerFactory'

  # McpToolHandler is a value object with string constructor args (serverName,
  # mcpName) plus a service dependency (invoker) — not an autowireable service.
  # Exclude it from the container so Symfony DI does not report missing
  # autowiring for its scalar parameters.
  Ineersa\CodingAgent\Mcp\Tool\McpToolHandler:
    autowire: false

  # ─── MCP-05 MCP-aware ExecuteToolCall routing middleware ────────────

  # Intercepts outbound ExecuteToolCall on agent.execution.bus and stamps
  # MCP-backed tools with TransportNamesStamp(['mcp']) before send_message
  # routes them.  Wired in messenger.yaml as bus-level middleware.
  Ineersa\CodingAgent\Mcp\Messenger\McpExecuteToolCallRoutingMiddleware: ~
