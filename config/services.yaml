# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
parameters:
    # Temporary default model — AI-10 per-turn routing replaces this.
    app.default_model: 'deepseek/deepseek-v4-pro'

services:
  _defaults:
    autowire: true
    autoconfigure: true

  _instanceof:
    Ineersa\Tui\Listener\TuiListenerRegistrar:
      tags: ['app.tui_listener']

  Ineersa\CodingAgent\:
    resource: '../src/CodingAgent/'

  Ineersa\AgentCore\:
    resource: '../src/AgentCore/'

  Ineersa\Tui\:
    resource: '../src/Tui/'

  # ─── File-backed agent-core stores ───
  # These need explicit wiring because $projectDir is a string that
  # cannot be autowired.

  Ineersa\AgentCore\Infrastructure\Storage\SessionRunStore:
    arguments:
      $projectDir: '%kernel.project_dir%'

  Ineersa\AgentCore\Infrastructure\Storage\SessionRunEventStore:
    arguments:
      $projectDir: '%kernel.project_dir%'

  # ─── Hatfield config services ───

  Ineersa\CodingAgent\Config\AppResourceLocator:
    arguments:
      $appRoot: '%kernel.project_dir%'

  Ineersa\CodingAgent\Config\SettingsPathResolver:
    arguments:
      $appRoot: '%kernel.project_dir%'

  Ineersa\CodingAgent\Config\HomeSettingsWriter: ~

  Ineersa\CodingAgent\Config\AppConfigLoader: ~

  Ineersa\CodingAgent\Config\AppConfigResolver: ~

  Ineersa\CodingAgent\Session\HatfieldSessionStore:
    arguments:
      $projectDir: '%kernel.project_dir%'

  Ineersa\Tui\Application\InteractiveMode:
    arguments:
      $listenerRegistrars: !tagged_iterator app.tui_listener

  # ─── Symfony AI Platform wiring ───

  Symfony\AI\Platform\PlatformInterface:
    factory: ['@Ineersa\CodingAgent\Infrastructure\SymfonyAi\ConfiguredSymfonyAiPlatformFactory', 'createPlatform']
    arguments:
      $projectCwd: '%kernel.project_dir%'

  # Temporary default model binding — AI-10 per-turn routing replaces this.
  Ineersa\AgentCore\Application\Handler\ExecuteLlmStepWorker:
    arguments:
      $defaultModel: '%app.default_model%'
