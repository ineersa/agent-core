# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
parameters:
    # Temporary default model — AI-10 per-turn routing replaces this.
    app.default_model: 'deepseek/deepseek-v4-pro'


services:
  _defaults:
    autowire: true
    autoconfigure: true

  _instanceof:
    Ineersa\Tui\Listener\TuiListenerRegistrar:
      tags: ['app.tui_listener']

    Ineersa\AgentCore\Contract\Hook\BeforeProviderRequestHookInterface:
      tags: ['agent_core.before_provider_request_hook']

    Ineersa\AgentCore\Application\Pipeline\RunMessageHandler:
      tags: ['agent_core.run_message_handler']

    Ineersa\AgentCore\Contract\Extension\CommandHandlerInterface:
      tags: ['agent_core.command_handler']

    Ineersa\AgentCore\Contract\Extension\HookSubscriberInterface:
      tags: ['agent_core.hook_subscriber']

    Ineersa\AgentCore\Contract\Hook\TransformContextHookInterface:
      tags: ['agent_core.transform_context_hook']

    Ineersa\AgentCore\Contract\Hook\ConvertToLlmHookInterface:
      tags: ['agent_core.convert_to_llm_hook']

    # Built-in tool providers are auto-collected by ToolRegistry
    # for permanent registration during registry construction.
    Ineersa\CodingAgent\Tool\HatfieldToolProviderInterface:
      tags: ['hatfield.tool_provider']

  Ineersa\CodingAgent\:
    resource: '../src/CodingAgent/'
    exclude: '../src/CodingAgent/ExtensionApi/'

  Ineersa\AgentCore\:
    resource: '../src/AgentCore/'

  Ineersa\Tui\:
    resource: '../src/Tui/'

  # ─── Session stores — resolved via HatfieldSessionStore for path ───

  Ineersa\AgentCore\Contract\IdempotencyStoreInterface:
    alias: Ineersa\CodingAgent\Session\JsonlIdempotencyStore

  # ─── Hatfield config services ───

  Ineersa\CodingAgent\Config\AppResourceLocator:
    arguments:
      $appRoot: '%kernel.project_dir%'

  Ineersa\CodingAgent\Config\SettingsPathResolver:
    arguments:
      $appRoot: '%kernel.project_dir%'

  Ineersa\CodingAgent\Config\HomeSettingsWriter: ~

  Ineersa\CodingAgent\Config\AppConfigLoader: ~

  # AppConfig is a value object, not an autowireable service.
  # The container uses the fromContainer() factory to construct it.
  Ineersa\CodingAgent\Config\AppConfig:
    factory: ['Ineersa\CodingAgent\Config\AppConfig', 'fromContainer']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfigLoader'
      - '@Ineersa\CodingAgent\Config\AppResourceLocator'
      - '@Symfony\Component\Serializer\SerializerInterface'

  # ─── Extension wiring ───

  Ineersa\CodingAgent\Extension\ExtensionToolRegistryBridge: ~

  Ineersa\Hatfield\ExtensionApi\ExtensionApiInterface:
    alias: Ineersa\CodingAgent\Extension\ExtensionToolRegistryBridge

  # Retained for backward compat (referenced in extension manager tests).
  # No longer the primary ExtensionApiInterface implementation.
  Ineersa\CodingAgent\Extension\ExtensionApiBridge: ~

  Ineersa\CodingAgent\Extension\ExtensionManager:
    arguments:
      $extensionApi: '@Ineersa\Hatfield\ExtensionApi\ExtensionApiInterface'

  # LoggingConfig is derived from AppConfig and autowireable.
  Ineersa\CodingAgent\Config\LoggingConfig:
    factory: ['Ineersa\CodingAgent\Config\LoggingConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  # OutputCapConfig is derived from AppConfig and autowireable.
  Ineersa\CodingAgent\Config\OutputCapConfig:
    factory: ['Ineersa\CodingAgent\Config\OutputCapConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  # ImageToolConfig is derived from AppConfig and autowireable.
  Ineersa\CodingAgent\Config\ImageToolConfig:
    factory: ['Ineersa\CodingAgent\Config\ImageToolConfig', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  # CodingAgentImageCapabilityChecker — wraps HatfieldModelCatalog from AppConfig.
  Ineersa\CodingAgent\Tool\ImageProcessing\CodingAgentImageCapabilityChecker:
    factory: ['Ineersa\CodingAgent\Tool\ImageProcessing\CodingAgentImageCapabilityChecker', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  Ineersa\AgentCore\Contract\Model\ImageCapabilityCheckerInterface:
    alias: Ineersa\CodingAgent\Tool\ImageProcessing\CodingAgentImageCapabilityChecker

  # Wire the image capability checker into AgentMessageConverter so synthetic
  # image attachments are gated by the active model's capabilities.
  Ineersa\AgentCore\Infrastructure\SymfonyAi\AgentMessageConverter:
    calls:
      - setImageCapabilityChecker: ['@Ineersa\AgentCore\Contract\Model\ImageCapabilityCheckerInterface']

  Ineersa\CodingAgent\Session\HatfieldSessionStore: ~

  Ineersa\AgentCore\Infrastructure\SymfonyAi\BeforeProviderRequestSubscriber:
    arguments:
      $hooks: !tagged_iterator agent_core.before_provider_request_hook

  Ineersa\Tui\Application\InteractiveMode:
    arguments:
      $listenerRegistrars: !tagged_iterator app.tui_listener

  # ─── Runtime stream wiring ───

  Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink: ~

  Ineersa\CodingAgent\Runtime\Contract\RuntimeEventSinkInterface:
    alias: Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink

  Ineersa\CodingAgent\Runtime\Stream\StdoutRuntimeEventSink: ~

  # Stream subscribers: autowiring cannot resolve RuntimeEventSinkInterface
  # because there are two implementations (in-process and STDOUT). Explicitly
  # wire the in-process sink as $sink and the STDOUT sink as $stdoutSink.
  Ineersa\CodingAgent\Runtime\Stream\AssistantTextStreamSubscriber:
    arguments:
      $sink: '@Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink'
      $stdoutSink: '@Ineersa\CodingAgent\Runtime\Stream\StdoutRuntimeEventSink'

  Ineersa\CodingAgent\Runtime\Stream\AssistantThinkingStreamSubscriber:
    arguments:
      $sink: '@Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink'
      $stdoutSink: '@Ineersa\CodingAgent\Runtime\Stream\StdoutRuntimeEventSink'

  Ineersa\CodingAgent\Runtime\Stream\ToolCallStreamSubscriber:
    arguments:
      $sink: '@Ineersa\CodingAgent\Runtime\InProcess\InMemoryRuntimeEventSink'
      $stdoutSink: '@Ineersa\CodingAgent\Runtime\Stream\StdoutRuntimeEventSink'

  # ─── Controller event loop ───

  Ineersa\CodingAgent\Runtime\Controller\ConsumerSupervisor: ~

  Ineersa\CodingAgent\Runtime\Controller\HeadlessController:
    arguments:
      $dispatcher: '@event_dispatcher'

  # Stream observer delegates to Symfony EventDispatcher with per-delta subscribers.
  Ineersa\CodingAgent\Runtime\Stream\LlmStreamDispatchObserver:
    arguments:
      $dispatcher: '@event_dispatcher'

  Ineersa\AgentCore\Contract\Hook\LlmStreamObserverInterface:
    alias: Ineersa\CodingAgent\Runtime\Stream\LlmStreamDispatchObserver

  # The mapper now dispatches through the shared Symfony dispatcher
  # so mapping subscribers (registered via autoconfigure) receive events.
  Ineersa\CodingAgent\Runtime\Protocol\RuntimeEventMapper:
    arguments:
      $dispatcher: '@event_dispatcher'

  Ineersa\CodingAgent\Runtime\Contract\TranscriptProjectorInterface:
    alias: Ineersa\CodingAgent\Runtime\ProjectionPipeline\TranscriptProjector

  # ─── Symfony AI Platform wiring ───
  # PlatformInterface reads Hatfield config from autowired AppConfig,
  # so no explicit arguments are needed here.

  Symfony\AI\Platform\PlatformInterface:
    factory: ['@Ineersa\CodingAgent\Infrastructure\SymfonyAi\ConfiguredSymfonyAiPlatformFactory', 'createPlatform']

  # Default model binding (fallback when no resolver or no session context).
  Ineersa\AgentCore\Application\Handler\ExecuteLlmStepWorker:
    arguments:
      $defaultModel: '%app.default_model%'

  # ─── System prompt builder ───
  Symfony\AI\Platform\Message\TemplateRenderer\StringTemplateRenderer: ~

  Ineersa\CodingAgent\SystemPrompt\SystemPromptBuilder:
    arguments:
      $projectDir: '%kernel.project_dir%'

  # ToolRegistry — concrete CodingAgent registry for permanent/dynamic tools.
  # Tagged built-in providers are seeded during registry construction.
  Ineersa\CodingAgent\Tool\ToolRegistry:
    arguments:
      $providers: !tagged_iterator hatfield.tool_provider

  Ineersa\CodingAgent\Tool\ToolRegistryInterface:
    alias: Ineersa\CodingAgent\Tool\ToolRegistry

  # CodingAgent ToolSetResolver — bridges ToolRegistry to AgentCore resolver seam.
  Ineersa\CodingAgent\Tool\CodingAgentToolSetResolver: ~

  Ineersa\AgentCore\Contract\Tool\ToolSetResolverInterface:
    alias: Ineersa\CodingAgent\Tool\CodingAgentToolSetResolver

  # RegistryBackedToolbox — reads ToolRegistry definitions and exposes them through
  # the Symfony AI ToolboxInterface so the existing Execution pipeline can invoke
  # registered handlers (permanent, dynamic, and extension-registered tools).
  Ineersa\CodingAgent\Tool\RegistryBackedToolbox:
    arguments:
      $registry: '@Ineersa\CodingAgent\Tool\ToolRegistryInterface'

  Symfony\AI\Agent\Toolbox\ToolboxInterface:
    alias: Ineersa\CodingAgent\Tool\RegistryBackedToolbox

  # ─── TOOLS-00 Tool cancellation context bridge ───

  Ineersa\AgentCore\Application\Tool\StackToolExecutionContextAccessor: ~

  # ToolSettings resolves tools.execution defaults from typed AppConfig DTOs.
  Ineersa\CodingAgent\Config\ToolSettings:
    factory: ['Ineersa\CodingAgent\Config\ToolSettings', 'fromAppConfig']
    arguments:
      - '@Ineersa\CodingAgent\Config\AppConfig'

  Ineersa\AgentCore\Contract\Tool\ToolExecutionSettingsInterface:
    alias: Ineersa\CodingAgent\Config\ToolSettings

  # Tool executor wiring: read execution defaults from merged Hatfield settings.
  # The toolbox wires to RegistryBackedToolbox; toolSetResolver to CodingAgentToolSetResolver.
  Ineersa\AgentCore\Application\Handler\ToolExecutor:
    factory: ['Ineersa\AgentCore\Application\Handler\ToolExecutor', 'fromSettings']
    arguments:
      $settings: '@Ineersa\AgentCore\Contract\Tool\ToolExecutionSettingsInterface'
      $toolbox: '@Symfony\AI\Agent\Toolbox\ToolboxInterface'
      $toolSetResolver: '@Ineersa\AgentCore\Contract\Tool\ToolSetResolverInterface'

  # Durable tool batch store — persists batch state across consumer restarts.
  # Uses the shared messenger SQLite via Doctrine DBAL.
  Ineersa\CodingAgent\Tool\Store\DbalToolBatchStore: ~

  Ineersa\AgentCore\Contract\Tool\ToolBatchStoreInterface:
    alias: Ineersa\CodingAgent\Tool\Store\DbalToolBatchStore

  # ToolExecutionPolicyResolver is created inline by ToolExecutor,
  # but is also an optional dependency of LlmStepResultHandler.
  Ineersa\AgentCore\Application\Handler\ToolExecutionPolicyResolver:
    factory: ['Ineersa\AgentCore\Application\Handler\ToolExecutionPolicyResolver', 'fromSettings']
    arguments:
      $settings: '@Ineersa\AgentCore\Contract\Tool\ToolExecutionSettingsInterface'

  # ─── AI-10 Per-turn model/reasoning routing ───

  Ineersa\CodingAgent\Config\SessionAwareModelResolver: ~

  Ineersa\AgentCore\Contract\Model\ModelResolverInterface:
    alias: Ineersa\CodingAgent\Config\SessionAwareModelResolver

  Ineersa\CodingAgent\Infrastructure\SymfonyAi\SymfonyAiProviderRegistry: ~

  Ineersa\AgentCore\Contract\Model\ProviderRegistryInterface:
    alias: Ineersa\CodingAgent\Infrastructure\SymfonyAi\SymfonyAiProviderRegistry

  Ineersa\AgentCore\Infrastructure\SymfonyAi\ModelResolverRoutingSubscriber:
    arguments:
      $modelResolver: '@Ineersa\AgentCore\Contract\Model\ModelResolverInterface'
      $providerRegistry: '@Ineersa\AgentCore\Contract\Model\ProviderRegistryInterface'

  # ─── AgentCore pipeline wiring (services that need tagged iterators or scalar binding) ───

  Ineersa\AgentCore\Application\Pipeline\RunMessageProcessor:
    arguments:
      $handlers: !tagged_iterator agent_core.run_message_handler

  Ineersa\AgentCore\Application\Handler\StepDispatcher:
    arguments:
      $executionBus: '@agent.execution.bus'

  Ineersa\AgentCore\Application\Handler\CommandHandlerRegistry:
    arguments:
      $handlers: !tagged_iterator agent_core.command_handler

  Ineersa\AgentCore\Application\Handler\HookSubscriberRegistry:
    arguments:
      $subscribers: !tagged_iterator agent_core.hook_subscriber

  # LlmPlatformAdapter hooks — currently no implementations exist.
  Ineersa\AgentCore\Infrastructure\SymfonyAi\LlmPlatformAdapter:
    arguments:
      $transformContextHooks: !tagged_iterator agent_core.transform_context_hook
      $convertToLlmHooks: !tagged_iterator agent_core.convert_to_llm_hook

  Ineersa\AgentCore\Contract\Model\PlatformInterface:
    alias: Ineersa\AgentCore\Infrastructure\SymfonyAi\LlmPlatformAdapter
