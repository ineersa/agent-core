# Gruvbox Dark — warm retro palette, popular in Vim/Neovim ecosystem.
name: gruvbox-dark
vars:
    bg0: "#282828"
    bg1: "#3c3836"
    bg2: "#504945"
    bg3: "#665c54"
    fg: "#ebdbb2"
    fg4: "#a89984"
    red: "#fb4934"
    green: "#b8bb26"
    yellow: "#fabd2f"
    blue: "#83a598"
    purple: "#d3869b"
    aqua: "#8ec07c"
    orange: "#fe8019"

colors:
    accent: "aqua"
    border: "bg2"
    border_accent: "aqua"
    border_muted: "bg1"
    success: "green"
    error: "red"
    warning: "yellow"
    muted: "bg3"
    dim: "bg2"
    text: ""

    thinking_text: "bg3"
    user_message_bg: "#3c3836"
    user_message_text: ""
    user_message: ""

    tool_pending_bg: "#282828"
    tool_success_bg: "#2a3028"
    tool_error_bg: "#302828"
    tool_title: "aqua"
    tool_output: ""
    tool: "aqua"

    markdown_heading: "orange"
    markdown_link: "blue"
    markdown_link_url: "bg3"
    markdown_code: "aqua"
    markdown_code_block: ""
    markdown_code_block_border: "bg2"
    markdown_quote: "bg3"
    markdown_quote_border: "bg2"
    markdown_hr: "bg2"
    markdown_list_bullet: "aqua"

    diff_added: "green"
    diff_removed: "red"
    diff_context: "bg3"

    syntax_comment: "bg3"
    syntax_keyword: "red"
    syntax_function: "green"
    syntax_variable: "blue"
    syntax_string: "green"
    syntax_number: "purple"
    syntax_type: "yellow"
    syntax_operator: "orange"
    syntax_punctuation: "fg4"

    thinking_off: "bg2"
    thinking_minimal: "bg3"
    thinking_low: "blue"
    thinking_medium: "aqua"
    thinking_high: "purple"
    thinking_xhigh: "red"

    bash_mode: "orange"
    header: "aqua"
    footer: "bg3"
    separator: "bg2"
    prompt: "aqua"
    working: "aqua"
