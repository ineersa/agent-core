# Cyberpunk theme — high-contrast neon-on-dark palette.
name: cyberpunk
vars:
    neon: "#ff00ff"
    electric: "#00ffff"
    hot: "#ff3366"
    acid: "#39ff14"
    amber: "#ffaa00"
    steel: "#4a5568"
    smoke: "#718096"

colors:
    accent: "electric"
    border: "steel"
    border_accent: "neon"
    border_muted: "steel"
    success: "acid"
    error: "hot"
    warning: "amber"
    muted: "smoke"
    dim: "steel"
    text: ""

    thinking_text: "smoke"
    user_message_bg: "#16213e"
    user_message_text: ""
    user_message: ""

    tool_pending_bg: "#0f0f1a"
    tool_success_bg: "#0a1a0a"
    tool_error_bg: "#1a0a0a"
    tool_argument_key: "muted"
    tool_argument_value: "text"
    tool_title: "electric"
    tool_output: ""
    tool: "electric"

    markdown_heading: "neon"
    markdown_link: "electric"
    markdown_link_url: "smoke"
    markdown_code: "acid"
    markdown_code_block: ""
    markdown_code_block_border: "steel"
    markdown_quote: "smoke"
    markdown_quote_border: "steel"
    markdown_hr: "steel"
    markdown_list_bullet: "electric"

    diff_added: "acid"
    diff_removed: "hot"
    diff_context: "smoke"

    syntax_comment: "smoke"
    syntax_keyword: "neon"
    syntax_function: "electric"
    syntax_variable: "amber"
    syntax_string: "acid"
    syntax_number: "hot"
    syntax_type: "electric"
    syntax_operator: "neon"
    syntax_punctuation: "smoke"

    thinking_off: "steel"
    thinking_minimal: "smoke"
    thinking_low: "electric"
    thinking_medium: "neon"
    thinking_high: "hot"
    thinking_xhigh: "#ff0000"
    thinking_max: "#9214fa"

    bash_mode: "amber"
    header: "electric"
    footer: "smoke"
    separator: "steel"
    prompt: "electric"
    working: "electric"
