# Tokyo Night — vibrant, cyber/neon-inspired dark palette.
name: tokyo-night
vars:
    bg: "#1a1b26"
    bg_dark: "#16161e"
    bg_hl: "#292e42"
    blue: "#7aa2f7"
    cyan: "#7dcfff"
    magenta: "#bb9af7"
    orange: "#ff9e64"
    green: "#9ece6a"
    red: "#f7768e"
    yellow: "#e0af68"
    fg_dark: "#545c7e"
    fg_gutter: "#3b4261"
    comment: "#565f89"

colors:
    accent: "blue"
    border: "fg_gutter"
    border_accent: "blue"
    border_muted: "fg_gutter"
    success: "green"
    error: "red"
    warning: "yellow"
    muted: "comment"
    dim: "fg_gutter"
    text: ""

    thinking_text: "comment"
    user_message_bg: "#292e42"
    user_message_text: ""
    user_message: ""

    tool_pending_bg: "#1a1b26"
    tool_success_bg: "#1a2620"
