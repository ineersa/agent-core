    tool_argument_key: "muted"
    tool_argument_value: "text"
    tool_title: "blue"
    tool_output: ""
    tool: "blue"

    markdown_heading: "orange"
    markdown_link: "cyan"
    markdown_link_url: "comment"
    markdown_code: "green"
    markdown_code_block: ""
    markdown_code_block_border: "fg_gutter"
    markdown_quote: "comment"
    markdown_quote_border: "fg_gutter"
    markdown_hr: "fg_gutter"
    markdown_list_bullet: "cyan"

    diff_added: "green"
    diff_removed: "red"
