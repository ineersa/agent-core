# Oh-P Dark — Oh My Posh-inspired clean dark theme.
name: oh-p-dark
vars:
    cyan: "#00d4aa"
    blue: "#5b9bf5"
    purple: "#b48ead"
    orange: "#d19a66"
    green: "#98c379"
    red: "#e06c75"
    yellow: "#e5c07b"
    gray1: "#3e4452"
    gray2: "#5c6370"
    gray3: "#abb2bf"

colors:
    accent: "cyan"
    border: "gray1"
    border_accent: "cyan"
    border_muted: "gray1"
    success: "green"
    error: "red"
    warning: "yellow"
    muted: "gray2"
    dim: "gray1"
    text: ""

    thinking_text: "gray2"
    user_message_bg: "#2c313a"
    user_message_text: ""
    user_message: ""

    tool_pending_bg: "#1e2127"
    tool_success_bg: "#1e2a1e"
    tool_error_bg: "#2a1e1e"
    tool_argument_key: "muted"
    tool_argument_value: "text"
    tool_title: "cyan"
    tool_output: ""
    tool: "cyan"

    markdown_heading: "orange"
    markdown_link: "blue"
    markdown_link_url: "gray2"
    markdown_code: "cyan"
    markdown_code_block: ""
    markdown_code_block_border: "gray1"
    markdown_quote: "gray2"
    markdown_quote_border: "gray1"
    markdown_hr: "gray1"
    markdown_list_bullet: "cyan"

    diff_added: "green"
    diff_removed: "red"
    diff_context: "gray2"

    syntax_comment: "gray2"
    syntax_keyword: "purple"
    syntax_function: "blue"
    syntax_variable: "orange"
    syntax_string: "green"
    syntax_number: "orange"
    syntax_type: "cyan"
    syntax_operator: "purple"
    syntax_punctuation: "gray3"

    thinking_off: "gray1"
    thinking_minimal: "gray2"
    thinking_low: "blue"
    thinking_medium: "cyan"
    thinking_high: "purple"
    thinking_xhigh: "red"
    thinking_max: "#9214fa"

    bash_mode: "orange"
    header: "cyan"
    footer: "gray2"
    separator: "gray1"
    prompt: "cyan"
    working: "cyan"
