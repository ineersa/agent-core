# Test environment service overrides.
#
# These are automatically loaded by Kernel::configureContainer()
# as services_{environment}.yaml when APP_ENV=test.

services:
  # BackgroundProcessManager in test env: do NOT register a PHP shutdown
  # handler. In production the handler terminates running background
  # processes on process exit. In tests, IsolatedKernelTestCase closes
  # the EntityManager in tearDown(), and DAMA/DoctrineTestBundle rolls
  # back the transaction after each test. A registered shutdown function
  # that queries Doctrine after these operations would fail.
  #
  # Test classes that explicitly need shutdown behavior call
  # $manager->shutdownCleanup() directly.
  #
  # This MUST be a complete, self-contained service definition.
  # Partial overrides (only the parts you want to change) are NOT
  # supported — any service listed here replaces the full definition.
  Ineersa\CodingAgent\Tool\BackgroundProcessManager:
    arguments:
      $store: '@Ineersa\CodingAgent\Tool\BackgroundProcess\ProcessStore'
      $lifecycle: '@Ineersa\CodingAgent\Tool\BackgroundProcess\ProcessLifecycle'
      $config: '@Ineersa\CodingAgent\Config\BackgroundProcessConfig'
      $logger: '@Psr\Log\LoggerInterface'
    # No calls: registerShutdownHandler is intentionally omitted.

  # Short HTTP timeout for LLM requests so controller/llm-real/TUI E2E
  # tests fail fast (within 5s) when llama.cpp generation is stuck instead
  # of hanging for 90s+ until the Castor-level timeout. Production/dev runs
  # use a permissive 300s default via SymfonyAiProviderFactory::getHttpClient()
  # when no explicit HttpClient is injected.
  Symfony\Contracts\HttpClient\HttpClientInterface:
    factory: ['Symfony\Component\HttpClient\HttpClient', 'create']
    arguments:
      $defaultOptions:
        timeout: 5
