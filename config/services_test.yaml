# Test-environment overrides — loaded only when Kernel env is 'test'.
#
# This file is imported by KernelTrait::configureContainer() as
#   config/{services}_test.yaml
#
# Use ALIASES (not service redefinitions) to avoid stripping
# autowiring/constructor args from namespace-scanned services.
services:
  _defaults:
    public: false

  # Public alias for the runtime boundary so integration tests
  # can retrieve InProcessAgentSessionClient from the container.
  test.runtime_client:
    alias: Ineersa\CodingAgent\Runtime\InProcess\InProcessAgentSessionClient
    public: true
