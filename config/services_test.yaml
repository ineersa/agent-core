# Test environment service overrides.
#
# These are automatically loaded by Kernel::configureContainer()
# as services_{environment}.yaml when APP_ENV=test.

services:
  # BackgroundProcessManager in test env: do NOT register a PHP shutdown
  # handler. In production the handler terminates running background
  # processes on process exit. In tests, IsolatedKernelTestCase closes
  # the EntityManager in tearDown(), and DAMA/DoctrineTestBundle rolls
  # back the transaction after each test. A registered shutdown function
  # that queries Doctrine after these operations would fail.
  #
  # Test classes that explicitly need shutdown behavior call
  # $manager->shutdownCleanup() directly.
  #
  # This MUST be a complete, self-contained service definition.
  # Partial overrides (only the parts you want to change) are NOT
  # supported — any service listed here replaces the full definition.
  Ineersa\CodingAgent\Tool\BackgroundProcessManager:
    arguments:
      $store: '@Ineersa\CodingAgent\Tool\BackgroundProcess\ProcessStore'
      $lifecycle: '@Ineersa\CodingAgent\Tool\BackgroundProcess\ProcessLifecycle'
      $config: '@Ineersa\CodingAgent\Config\BackgroundProcessConfig'
      $logger: '@Psr\Log\LoggerInterface'
    # No calls: registerShutdownHandler is intentionally omitted.

  # In-memory ExtensionApiInterface test double for extension loading tests.
  # Does NOT override the production ExtensionApiInterface alias
  # (which stays on ExtensionToolRegistryBridge so SafeGuard and
  #  integration tests keep using the real bridge).
  # Available via container autowiring or direct instantiation.
  Ineersa\CodingAgent\Tests\Extension\InMemoryExtensionApiBridge:
    public: true

  Ineersa\CodingAgent\Session\Fork\ForkSessionCopyService:
    public: true
    autowire: true
    autoconfigure: true

  # Test HTTP client for LLM requests.  Two modes:
  #
  #  1. Replay  (HATFIELD_LLM_REPLAY_FIXTURE_PATH set):
  #     ControllerReplayHttpClientFactory  returns  a  MockHttpClient
  #     that serves pre-recorded SSE chunks from fixture files.  Used
  #     by  deterministic  controller  replay  E2E  (no  live  LLM).
  #
  #  2. Live (default): normal HttpClient with a 5s timeout so
  #     live LLM smoke tests fail fast when llama.cpp generation is
  #     stuck, instead of hanging for 90s+ until the Castor timeout.
  #
  #  The  factory  lives  in  tests/  —  NOT  in  production  src/.
  #  SymfonyAiProviderFactory  receives  the  injected  HttpClient
  #  through its constructor; no production env-var branching needed.
  Symfony\Contracts\HttpClient\HttpClientInterface:
    factory: ['Ineersa\CodingAgent\Tests\Runtime\Controller\E2E\Replay\ControllerReplayHttpClientFactory', 'create']
