# Hatfield built-in defaults.
#
# These are the base settings shipped with the application.
# They can be overridden by:
#   1. ~/.hatfield/settings.yaml  (global user settings)
#   2. <project>/.hatfield/settings.yaml  (project-local settings)
#
# Precedence: defaults < home < project
#
# Path placeholders supported:
#   %kernel.project_dir%  App installation directory
#   ~                     Home directory
#   relative paths        Resolved against the settings file's containing directory

tui:
    theme: cyberpunk
    theme_paths:
        - '%kernel.project_dir%/config/themes'
        - '.hatfield/themes'
        - '~/.hatfield/themes'

sessions:
    path: '.hatfield/sessions'

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------
#
# Tool execution defaults control scheduling policy and timeout metadata.
# Output capping persists oversized text output under tools.output_cap.path and
# replaces it with a model-facing capped notice containing inspection hints.
#
# Override any value here in your home or project settings.
#
tools:
    execution:
        # Default execution mode: sequential (one tool at a time) or parallel.
        # Parallel mode requires TOOLS-R05 / multi-consumer tool dispatch.
        default_mode: sequential

        # Default timeout in seconds exposed to tool implementations.
        timeout_seconds: 300

        # Maximum parallelism: how many tool calls to run concurrently.
        max_parallelism: 4

    output_cap:
        # Storage directory for persisted oversized output.
        # Relative paths resolve against the active project CWD.
        path: .hatfield/tmp/output-cap

        # Default character cap for non-doc paths (code files).
        default_cap: 20000

        # Character cap for doc-like paths (.md, .txt, .toon).
        doc_cap: 50000

        # Stale file retention in seconds (default 24 hours).
        retention: 86400

        # Optional session prefix for filenames (wired by TOOLS-R04+).
        # session_prefix: run-abc123

# ---------------------------------------------------------------------------
# Extensions
# ---------------------------------------------------------------------------
#
# Hatfield supports in-process PHP extensions that can register tools and
# integrate with the agent runtime. Extensions must implement
# Ineersa\Hatfield\ExtensionApi\HatfieldExtensionInterface.
#
# Extensions installed via Composer under .hatfield/extensions/vendor/ are
# autoloaded automatically at startup when the extensions.enabled list is
# non-empty.
#
# To enable an extension, add its fully-qualified class name to the list:
#
#   extensions:
#       enabled:
#           - Acme\HatfieldTaskWorkflow\TaskWorkflowExtension
#
# The list is empty by default — no extensions are loaded unless explicitly
# enabled.
#
extensions:
    enabled: []

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
#
# Controls application logging to .hatfield/logs/.
# Logs use JSONL format with daily rotation (one file per day).
#
logging:
    # Log storage directory. Relative paths resolve against the active
    # project CWD. Supports ~ (home) and %kernel.project_dir%.
    path: .hatfield/logs

    # Minimum log level. PSR-3 level names (lowercase):
    #   debug, info, notice, warning, error, critical, alert, emergency
    level: info

    # Number of daily rotated log files to retain before deletion.
    max_files: 14

# ---------------------------------------------------------------------------
# AI provider and model configuration
# ---------------------------------------------------------------------------
#
# This section controls which AI providers are available and which models
# can be selected. Secrets such as API keys should stay in your home
# settings (~/.hatfield/settings.yaml) and use the env:VAR syntax rather
# than plain text.
#
# Every selectable model must be explicitly listed under its provider.
# Unknown model names are rejected even for providers that could
# technically serve arbitrary loaded models (e.g. llama.cpp).
#
# Provider transport quirks that differ from standard OpenAI behaviour
# are recorded in an optional compatibility block.
#
