# Hatfield built-in defaults.
#
# These are the base settings shipped with the application.
# They can be overridden by:
#   1. ~/.hatfield/settings.yaml  (global user settings)
#   2. <project>/.hatfield/settings.yaml  (project-local settings)
#
# Precedence: defaults < home < project
#
# Environment variables (read at process startup, not from YAML):
#   HATFIELD_CAPTURE_ERRORS=1  (default)  Convert caught exceptions to
#                               user-visible runtime/TUI errors.
#   HATFIELD_CAPTURE_ERRORS=0             Crash/rethrow on errors —
#                               for test harnesses that need loud failures.
#
# Path placeholders supported:
#   %kernel.project_dir%  App installation directory
#   ~                     Home directory
#   relative paths        Resolved against the settings file's containing directory

tui:
    theme: cyberpunk
    theme_paths:
        - '%kernel.project_dir%/config/themes'
        - '.hatfield/themes'
        - '~/.hatfield/themes'

sessions:
    path: '.hatfield/sessions'

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------
#
# Tool execution defaults control scheduling policy and timeout metadata.
# Output capping persists oversized text output under tools.output_cap.path and
# replaces it with a model-facing capped notice containing inspection hints.
#
# Override any value here in your home or project settings.
#
tools:
    execution:
        # Default execution mode: sequential (one tool at a time) or parallel.
        # Parallel mode requires TOOLS-R05 / multi-consumer tool dispatch.
        default_mode: sequential

        # Default timeout in seconds exposed to tool implementations.
        timeout_seconds: 300

        # Maximum parallelism: how many tool calls to run concurrently.
        # Also controls the number of parallel messenger:consume tool
        # worker processes launched by the controller.
        max_parallelism: 4

        # Execution mode per tool is set at registration time by the tool
        # author/provider in ToolDefinitionDTO, not from settings overrides.
        # File-mutation tools (write, edit) are explicitly registered as
        # Sequential in their HatfieldToolProviderInterface::definition().

    image:
        # Maximum image file size in bytes (default: 10 MB).
        max_bytes: 10485760

        # Maximum image width in pixels (rejection limit).
        max_width: 4096

        # Maximum image height in pixels (rejection limit).
        max_height: 2000

        # Maximum pixel dimension for resize-to-fit (default: 2000).
        # Images exceeding this are scaled down to fit within a
        # max_dimension × max_dimension bounding box, preserving aspect
        # ratio. This is the resize target, not a rejection limit.
        max_dimension: 2000

        # Maximum allowed base64-encoded payload length in bytes.
        # Default 4.5 MiB — safe below Anthropic and OpenAI 5 MiB limits.
        # The processor reduces quality and/or dimensions to stay under
        # this limit.
        encoded_max_bytes: 4718592

        # Starting JPEG/WebP compression quality (1–100).
        jpeg_quality: 80

        # Minimum JPEG/WebP quality the processor may attempt (1–100).
        # The processor descends from jpeg_quality down to this minimum
        # in steps of ~15 before reducing dimensions.
        jpeg_min_quality: 40

    output_cap:
        # Storage directory for persisted oversized output.
        # Relative paths resolve against the active project CWD.
        path: .hatfield/tmp/output-cap

        # Default character cap for non-doc paths (code files).
        default_cap: 20000

        # Character cap for doc-like paths (.md, .txt, .toon).
        doc_cap: 50000

        # Stale file retention in seconds (default 24 hours).
        retention: 86400

        # Optional session prefix for persisted output filenames.
        # session_prefix: run-abc123

    background_process:
        # Storage directory for background process log files.
        # Relative paths resolve against the active project CWD.
        path: .hatfield/tmp/bg

        # Stale log/record retention in seconds (default 24 hours).
        retention: 86400

        # Grace period in seconds for SIGTERM before SIGKILL on stop.
        stop_grace_seconds: 5

        # Maximum characters returned by bg_status log action.
        log_tail_chars: 5000

# ---------------------------------------------------------------------------
# Extensions
# ---------------------------------------------------------------------------
#
# Hatfield supports in-process PHP extensions that can register tools and
# integrate with the agent runtime. Extensions must implement
# Ineersa\Hatfield\ExtensionApi\HatfieldExtensionInterface.
#
# Extensions installed via Composer under .hatfield/extensions/vendor/ are
# autoloaded automatically at startup when the extensions.enabled list is
# non-empty.
#
# To enable an extension, add its fully-qualified class name to the list:
#
#   extensions:
#       enabled:
#           - Acme\HatfieldTaskWorkflow\TaskWorkflowExtension
#
# The list is empty by default — no extensions are loaded unless explicitly
# enabled.
#
extensions:
    enabled:
        - Ineersa\CodingAgent\Extension\Builtin\SafeGuard\SafeGuardExtension

    # Generic extension settings exposed via the Extension API.
    # Each extension reads its own section by key.
    #
    # SafeGuard settings (key: 'safe_guard'):
    #
    # Hard-blocked operations (never negotiable):
    #   - sudo / privilege escalation
    #
    # Dangerous commands (can be allowlisted via allow_command_patterns):
    #   rm, rmdir, git clean, git reset --hard, git checkout -- .,
    #   mkfs, dd if=, chmod 777, chown -R, mv ... /dev/null
    #
    # Dangerous git (can be allowlisted):
    #   git push --force/-f, git branch -d/-D, git tag -d,
    #   git rebase, git reflog expire
    #
    # Sensitive info exposure (can be allowlisted):
    #   env, printenv (and piped variants)
    #
    # Protected read patterns are additive on top of built-in defaults:
    #   .env.local, auth.json, .ssh/id_*, .aws/credentials,
    #   .kube/config, *.pem, *.key, service-account files
    #
    # Writes/edits outside the current working directory (can be allowlisted).
    #
    settings:
        safe_guard:
            # Tool names used for matching (configurable to support custom tool aliases).
            tool_names:
                bash: bash
                write: write
                edit: edit
                read: read

            # Command substrings that bypass destructive/dangerous checks.
            allow_command_patterns: []

            # Absolute paths where writes outside CWD are always allowed.
            allow_write_outside_cwd: []

            # Destructive-in-paths list (reserved for serialization compatibility.
            # Currently not wired to any classification logic).
            allow_destructive_in_paths: []

            # Additional filename/path patterns that require confirmation to read.
            # These are added on top of the built-in defaults (which cannot be removed).
            protected_read_patterns: []

            # Extra command substrings to treat as dangerous (added to built-in regexes).
            dangerous_command_patterns: []

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
#
# Controls application logging to .hatfield/logs/.
# Logs use JSONL format with daily rotation (one file per day).
#
logging:
    # Log storage directory. Relative paths resolve against the active
    # project CWD. Supports ~ (home) and %kernel.project_dir%.
    path: .hatfield/logs

    # Minimum log level. PSR-3 level names (lowercase):
    #   debug, info, notice, warning, error, critical, alert, emergency
    level: info

    # Number of daily rotated log files to retain before deletion.
    max_files: 14

# ---------------------------------------------------------------------------
# AI provider and model configuration
# ---------------------------------------------------------------------------
#
# This section controls which AI providers are available and which models
# can be selected. Secrets such as API keys should stay in your home
# settings (~/.hatfield/settings.yaml) and use the env:VAR syntax rather
# than plain text.
#
# Every selectable model must be explicitly listed under its provider.
# Unknown model names are rejected even for providers that could
# technically serve arbitrary loaded models (e.g. llama.cpp).
#
# Provider transport quirks that differ from standard OpenAI behaviour
# are recorded in an optional compatibility block.
#
