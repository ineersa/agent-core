# Messenger bus, transport, and routing configuration.
#
# Three buses:
#   agent.command.bus    — sync orchestration for StartRun/ApplyCommand/AdvanceRun
#                          and results (LlmStepResult, ToolCallResult). Self-advance
#                          callbacks (postCommit) dispatch back here synchronously.
#   agent.execution.bus  — async LLM/tool work after ASYNC-04 (currently sync).
#   agent.publisher.bus  — async runtime event delivery for transient streaming
#                          deltas. Controller polls and forwards to TUI.
#
# Transports use Doctrine SQLite backed by .hatfield/messenger.sqlite.
# See config/packages/doctrine.yaml for DBAL configuration.

framework:
    messenger:
        default_bus: agent.command.bus
        buses:
            agent.command.bus:
                default_middleware:
                    enabled: true
                    allow_no_handlers: false
                    allow_no_senders: true
            agent.execution.bus:
                default_middleware:
                    enabled: true
                    allow_no_handlers: false
                    allow_no_senders: true
            agent.publisher.bus:
                default_middleware:
                    enabled: true
                    allow_no_handlers: true
                    allow_no_senders: true

        transports:
            run_control: 'doctrine://default?queue_name=run_control'
            llm:         'doctrine://default?queue_name=llm'
            tool:        'doctrine://default?queue_name=tool'
            publish:     'doctrine://default?queue_name=publish'

        routing:
            Ineersa\AgentCore\Domain\Message\PublishRuntimeEvent: publish
