# Messenger bus, transport, and routing configuration.
#
# Two buses:
#   agent.command.bus    — sync orchestration for StartRun/ApplyCommand/AdvanceRun
#                          and results (LlmStepResult, ToolCallResult). Self-advance
#                          callbacks (postCommit) dispatch back here synchronously.
#                          Results are handled sync within consumer processes — they
#                          are NOT routed through Doctrine transport.
#   agent.execution.bus  — async LLM/tool work. ExecuteLlmStep → llm transport,
#                          ExecuteToolCall → tool transport. Workers consume from
#                          their respective queues and dispatch results back to
#                          agent.command.bus within the same consumer process.
#
# Transports use Doctrine SQLite backed by .hatfield/messenger.sqlite.
# See config/packages/doctrine.yaml for DBAL configuration.
#
# After ASYNC-05:
# - StartRun → run_control transport (messenger:consume run_control)
# - ApplyCommand → run_control transport
# - AdvanceRun → run_control transport
# - ExecuteLlmStep → llm transport (messenger:consume llm)
# - ExecuteToolCall → tool transport (messenger:consume tool)
# - ExecuteToolCall (toolName=subagent) → agent transport via
#   SubagentExecuteToolCallRoutingMiddleware (messenger:consume agent)
# - McpInitializeSessionCommand → mcp transport (messenger:consume mcp)
#   MCP lifecycle messages are routed to the dedicated mcp consumer (Phase 1).
# - Result messages (LlmStepResult, ToolCallResult, CompactionStepResult) stay
#   sync on command bus within the consumer process where the worker ran.
#   RunOrchestrator is registered for agent.command.bus and handles results
#   in the same process.  CompactionStepResult is intentionally not routed
#   to a transport — it is dispatched synchronously by ExecuteCompactionStepWorker
#   via the agent.command.bus and processed by CompactionStepResultHandler
#   in the same consumer process, mirroring LlmStepResult / ToolCallResult.
#
# Transient streaming deltas (thinking, text, tool-call arguments) are
# delivered via STDOUT from the LLM consumer child process. The controller
# reads the child's stdout pipe and forwards events to the TUI. No
# Doctrine publish transport is needed.
#
# run_control transport uses PhpSerializer because StartRun contains complex
# objects (StartRunPayload with AgentMessage[] and RunMetadata) that would
# not round-trip correctly through the default Symfony Serializer.

parameters:
    env(HATFIELD_RUN_CONTROL_TRANSPORT_DSN): 'sync://'
    env(HATFIELD_AGENT_TRANSPORT_DSN): 'sync://'
    env(HATFIELD_MCP_TRANSPORT_DSN): 'in-memory://'
# llm and tool transports use the default Symfony Serializer since
# their messages contain only scalar/array properties.

framework:
    messenger:
        default_bus: agent.command.bus
        buses:
            agent.command.bus:
                default_middleware:
                    enabled: true
                    allow_no_handlers: false
                    allow_no_senders: true
            agent.execution.bus:
                default_middleware:
                    enabled: true
                    allow_no_handlers: false
                    allow_no_senders: true
                middleware:
                    # Subagent tool routing: stamps toolName=subagent with
                    # TransportNamesStamp(['agent']) before default YAML routes
                    # ExecuteToolCall to tool. Runs before MCP middleware.
                    - Ineersa\CodingAgent\Agent\Messenger\SubagentExecuteToolCallRoutingMiddleware
                    # MCP-aware routing: stamps MCP-backed ExecuteToolCall with
                    # TransportNamesStamp(['mcp']) so send_message routes to the
                    # single mcp consumer instead of the default tool transport.
                    # Runs before Symfony send_message middleware.
                    - Ineersa\CodingAgent\Mcp\Messenger\McpExecuteToolCallRoutingMiddleware

        transports:
            run_control:
                dsn: '%env(HATFIELD_RUN_CONTROL_TRANSPORT_DSN)%'
                serializer: 'messenger.transport.native_php_serializer'
            llm:         '%env(HATFIELD_LLM_TRANSPORT_DSN)%'
            tool:        '%env(HATFIELD_TOOL_TRANSPORT_DSN)%'
            agent:       '%env(HATFIELD_AGENT_TRANSPORT_DSN)%'
            mcp:         '%env(HATFIELD_MCP_TRANSPORT_DSN)%'

        routing:
            Ineersa\AgentCore\Domain\Message\StartRun: run_control
            Ineersa\AgentCore\Domain\Message\ApplyCommand: run_control
            # AdvanceRun is intentionally NOT routed to a transport.
            # It is handled synchronously by AdvanceRunHandler (registered on
            # agent.command.bus AND agent.execution.bus via RunMessageHandler
            # tagging in RunOrchestrator).
            #
            # Routing AdvanceRun to run_control would cause double-processing
            # when dispatched as an effect from CompactionStepResultHandler:
            # the effect goes to agent.execution.bus, SendMessageMiddleware
            # routes it to run_control (sync://), and SyncTransport re-dispatches
            # through RoutableMessageBus to agent.execution.bus where there
            # would be no handler — causing NoHandlerForMessageException.
            #
            # Both normal paths (StartRunHandler/ApplyCommandHandler postCommit
            # via agent.command.bus) and effect paths (CompactionStepResultHandler
            # via agent.execution.bus) now run synchronously with handlers on
            # both buses.
            # CompactRun is intentionally NOT routed to a transport.
            # It is handled synchronously by CompactRunHandler (registered on
            # agent.command.bus via RunMessageHandler tagging). Async work
            # (the LLM summarization call) is dispatched separately as
            # ExecuteCompactionStep → llm transport.
            #
            # Routing CompactRun to run_control would cause double-processing:
            # the sync handler runs once, then SendMessageMiddleware routes it
            # to the transport, and the consumer processes it again. With
            # sync:// transports this also triggers a second in-process dispatch
            # through RoutableMessageBus, which can route to agent.execution.bus
            # where there is no CompactRun handler, causing a
            # NoHandlerForMessageException retry loop.
            #
            # Auto-compaction (AutoCompactionHookSubscriber) dispatches
            # CompactRun from inside RunCommit → after-turn hook → the sync
            # handler in the same process; manual /compact dispatches from
            # CompactCommandHandler (in-process for TUI, via ApplyCommand for
            # headless controller). Neither path needs transport routing.
            Ineersa\AgentCore\Domain\Message\ExecuteLlmStep: llm
            Ineersa\AgentCore\Domain\Message\ExecuteCompactionStep: llm
            # Default tool transport; subagent is overridden to agent via middleware.
            Ineersa\AgentCore\Domain\Message\ExecuteToolCall: tool
            Ineersa\AgentCore\Domain\Message\ExecuteShellToolCall: tool
            Ineersa\CodingAgent\Mcp\Message\McpInitializeSessionCommand: mcp
            Ineersa\CodingAgent\Mcp\Message\McpRefreshCatalogCommand: mcp
            Ineersa\CodingAgent\Mcp\Message\McpDisconnectSessionCommand: mcp
