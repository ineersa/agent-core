# Monolog logging via MonologBundle.
#
# The HatfieldRotatingLogHandler is a custom service wired from Hatfield
# settings (LoggingConfig). MonologBundle wraps it as the main handler.
#
# The Psr\\Log\\LoggerInterface alias is configured automatically by
# MonologBundle — no manual wiring needed.

monolog:
    handlers:
        main:
            type: service
            id: Ineersa\CodingAgent\Logging\HatfieldRotatingLogHandler
            channels: ['!event', '!doctrine', '!console']
