# Test environment Messenger overrides.
#
# Defaults to in-memory transports so unit/kernel tests that boot the
# container do not require a real Doctrine queue database.  Named
# transports match the production config so routing works identically.
#
# KernelTestCase automatically resets in-memory transports between tests.
#
# Controller replay E2E (APP_ENV=test with HATFIELD_LLM_TRANSPORT_DSN
# etc. set via spawnController() env) overrides the in-memory defaults
# through Symfony's env-var parameter defaults: when the env var is
# explicitly set (Doctrine DSN), it wins.  When unset (normal unit/
# kernel tests), the in-memory:// fallback is used.
parameters:
    env(HATFIELD_RUN_CONTROL_TRANSPORT_DSN): 'in-memory://'
    env(HATFIELD_LLM_TRANSPORT_DSN): 'in-memory://'
    env(HATFIELD_TOOL_TRANSPORT_DSN): 'in-memory://'
    env(HATFIELD_AGENT_TRANSPORT_DSN): 'in-memory://'
    env(HATFIELD_MCP_TRANSPORT_DSN): 'in-memory://'

framework:
    messenger:
        transports:
            run_control:
                dsn: '%env(HATFIELD_RUN_CONTROL_TRANSPORT_DSN)%'
                # Keep native_php_serializer so StartRun (which contains
                # complex objects like AgentMessage[] and RunMetadata)
                # round-trips correctly through the in-memory transport
                # or the back-end Doctrine transport.
                serializer: 'messenger.transport.native_php_serializer'
            llm:
                dsn: '%env(HATFIELD_LLM_TRANSPORT_DSN)%'
            tool:
                dsn: '%env(HATFIELD_TOOL_TRANSPORT_DSN)%'
            agent:
                dsn: '%env(HATFIELD_AGENT_TRANSPORT_DSN)%'
            mcp:
                dsn: '%env(HATFIELD_MCP_TRANSPORT_DSN)%'
