# Doctrine DBAL + ORM configuration for SQLite-backed storage.
#
# Two SQLite files under .hatfield/ (CWD-relative; see Kernel app.cwd):
#   - messenger.sqlite          — app/runtime state (ORM entities, sessions metadata)
#   - messenger-transport.sqlite — Symfony Messenger doctrine transport only
#
# Splitting queue persistence from app-state writes prevents app DB write locks
# from blocking Messenger retry/redelivery (session-6 class failures).
#
# options key 2 = PDO::ATTR_TIMEOUT (seconds). SQLite maps this to PRAGMA
# busy_timeout (milliseconds = seconds × 1000), so 5 → 5000ms on both connections.
# Reduces immediate "database is locked" under concurrent workers sharing each file.
#
# ORM entities on the default connection:
#   - background_process  — BackgroundProcessManager durable tracking
#   - tool_batch_state    — DbalToolBatchStore parallel tool execution state
#   - tool_question       — ToolQuestionStore cross-process tool-local questions
#
doctrine:
    dbal:
        default_connection: default
        connections:
            default:
                driver: pdo_sqlite
                path: '%app.cwd%/.hatfield/messenger.sqlite'
                options:
                    2: 5

            messenger_transport:
                driver: pdo_sqlite
                path: '%app.cwd%/.hatfield/messenger-transport.sqlite'
                options:
                    2: 5

    orm:
        # Native lazy objects are the default in DoctrineBundle 3.x
        # (replaces proxy generation from earlier versions).
        # enable_lazy_ghost_objects and auto_generate_proxy_classes
        # are removed/no-op in DoctrineBundle 3.x.
        enable_native_lazy_objects: true
        default_entity_manager: default
        entity_managers:
            default:
                connection: default
                mappings:
                    CodingAgent\Entity:
                        dir: '%kernel.project_dir%/src/CodingAgent/Entity'
                        prefix: 'Ineersa\CodingAgent\Entity'
                        type: attribute
