# Doctrine DBAL + ORM configuration for SQLite-backed storage.
#
# DBAL connection is shared between Symfony Messenger Doctrine transport
# (run_control, llm, tool, publish) and project-owned entity tables.
#
# ORM entities are mapped under CodingAgent for:
#   - background_process  — BackgroundProcessManager durable tracking
#   - tool_batch_state    — DbalToolBatchStore parallel tool execution state
#
doctrine:
    dbal:
        default_connection: default
        connections:
            default:
                driver: pdo_sqlite
                # CWD-based: .hatfield/ lives relative to the user's working directory,
                # not the app install root. See Kernel::build() where app.cwd is set.
                path: '%app.cwd%/.hatfield/messenger.sqlite'

    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        default_entity_manager: default
        entity_managers:
            default:
                connection: default
                mappings:
                    CodingAgent\Entity:
                        dir: '%kernel.project_dir%/src/CodingAgent/Entity'
                        prefix: 'Ineersa\CodingAgent\Entity'
                        type: attribute
