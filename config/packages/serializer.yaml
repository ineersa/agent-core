services:
  _defaults:
    autowire: true
    autoconfigure: true

  # ── Normalizers ───────────────────────────────────────────────────────────

  serializer.normalizer.object:
    class: Symfony\Component\Serializer\Normalizer\ObjectNormalizer
    arguments:
      $classMetadataFactory: '@serializer.class_metadata_factory'
      $nameConverter: '@serializer.name_converter.metadata_aware'
      $propertyTypeExtractor: '@serializer.property_info_extractor'

  serializer.normalizer.datetime:
    class: Symfony\Component\Serializer\Normalizer\DateTimeNormalizer

  serializer.normalizer.enum:
    class: Symfony\Component\Serializer\Normalizer\BackedEnumNormalizer

  serializer.normalizer.json_serializable:
    class: Symfony\Component\Serializer\Normalizer\JsonSerializableNormalizer

  serializer.normalizer.array_denormalizer:
    class: Symfony\Component\Serializer\Normalizer\ArrayDenormalizer

  # ── Encoders ───────────────────────────────────────────────────────────────

  serializer.encoder.json:
    class: Symfony\Component\Serializer\Encoder\JsonEncoder

  # ── Serializer ─────────────────────────────────────────────────────────────

  serializer:
    class: Symfony\Component\Serializer\Serializer
    arguments:
      $normalizers:
        - '@serializer.normalizer.array_denormalizer'
        - '@serializer.normalizer.datetime'
        - '@serializer.normalizer.enum'
        - '@serializer.normalizer.object'
      $encoders:
        - '@serializer.encoder.json'

  Symfony\Component\Serializer\Serializer:
    alias: serializer

  Symfony\Component\Serializer\SerializerInterface:
    alias: serializer

  Symfony\Component\Serializer\Normalizer\NormalizerInterface:
    alias: serializer

  Symfony\Component\Serializer\Normalizer\DenormalizerInterface:
    alias: serializer

  # ── Serializer metadata / name conversion ──────────────────────────────────

  serializer.class_metadata_factory:
    class: Symfony\Component\Serializer\Mapping\Factory\ClassMetadataFactory
    arguments:
      $loader: '@serializer.metadata_loader.attribute'

  serializer.metadata_loader.attribute:
    class: Symfony\Component\Serializer\Mapping\Loader\AttributeLoader

  serializer.name_converter.metadata_aware:
    class: Symfony\Component\Serializer\NameConverter\MetadataAwareNameConverter
    arguments:
      $metadataFactory: '@serializer.class_metadata_factory'

  # ── Property info / type extraction ────────────────────────────────────────

  serializer.property_info_extractor:
    class: Symfony\Component\PropertyInfo\PropertyInfoExtractor
    arguments:
      $typeExtractors:
        - '@serializer.property_info.php_doc_extractor'
        - '@serializer.property_info.reflection_extractor'

  serializer.property_info.php_doc_extractor:
    class: Symfony\Component\PropertyInfo\Extractor\PhpDocExtractor

  serializer.property_info.reflection_extractor:
    class: Symfony\Component\PropertyInfo\Extractor\ReflectionExtractor
