# Architecture dependency enforcement config for Deptrac.
#
# Run: vendor/bin/deptrac analyze --config-file=depfile.yaml
#
# These rules enforce the runtime boundary:
#   - TUI may only depend on Runtime Contract/Protocol, TuiBundle, and Symfony TUI.
#   - TUI must not import AgentCore Application/Infrastructure or Messenger.
#   - TuiBundle must not depend on App or AgentCore.
#   - AgentCore must not depend on App, TuiBundle, Symfony TUI, HttpKernel, or FrameworkBundle.

parameters:
  paths:
    - ./src
  exclude_files:
    - .*\.test\.php$
    - .*Test\.php$

  layers:
    - name: AppTui
      collectors:
        - type: directory
          value: src/TUI/.*

    - name: AppRuntimeContract
      collectors:
        - type: directory
          value: src/Runtime/(Contract|Protocol)/.*

    - name: AppRuntimeInternals
      collectors:
        - type: directory
          value: src/Runtime/(InProcess|Process)/.*

    - name: AppCli
      collectors:
        - type: directory
          value: src/CLI/.*

    - name: TuiBundle
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\\\TuiBundle\\\\#i'

    - name: AgentCore
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\\\AgentCore\\\\#i'

    - name: SymfonyTui
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Tui\\\\#i'

    - name: SymfonyConsole
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Console\\\\#i'

    - name: SymfonyMessenger
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Messenger\\\\#i'

    - name: ForbiddenHttp
      collectors:
        - type: classNameRegex
          value: '#^(Symfony\\\\Component\\\\HttpKernel|Symfony\\\\Bundle\\\\FrameworkBundle)\\\\#i'

  ruleset:
    AppTui:
      - AppRuntimeContract
      - TuiBundle
      - SymfonyTui
      - SymfonyConsole

    AppRuntimeInternals:
      - AppRuntimeContract
      - AgentCore
      - SymfonyConsole
      - SymfonyMessenger

    AppRuntimeContract:
      - AgentCore
      - SymfonyConsole

    AppCli:
      - AppRuntimeContract
      - AppRuntimeInternals
      - AppTui
      - TuiBundle
      - SymfonyConsole

    TuiBundle:
      - SymfonyTui
      - SymfonyConsole

    AgentCore: ~
    SymfonyTui: ~
    SymfonyConsole: ~
    SymfonyMessenger: ~
    ForbiddenHttp: ~
