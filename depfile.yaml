      - TuiStartup
      - TuiLayout
      - TuiExtension
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter
      - TuiWidget
      - TuiTheme
      - SymfonyTui

    TuiLayout:
      - TuiWidget
      - TuiTheme
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter

    TuiExtension:
      - AppExtensionApi
      - AppRuntimeContract
      - TuiLayout
      - TuiWidget
      - TuiFooter
      - TuiTheme
      - TuiCommand
      - TuiRuntime
      - TuiPicker

    TuiHeader:
