# Architecture dependency enforcement config for Deptrac.
#
# Run: vendor/bin/deptrac analyze --config-file=depfile.yaml
#
# These rules enforce the runtime boundary:
#   - TuiApplication may depend only on Runtime Contract/Protocol, Session, Tui internals, and Symfony TUI/Console.
#   - TuiWidget and sub-widgets must not depend on CodingAgent or AgentCore.
#   - AgentCore must not depend on CodingAgent, Tui, Symfony TUI, HttpKernel, or FrameworkBundle.

parameters:
  paths:
    - ./src
    - .hatfield/extensions/task-workflow/src
  exclude_files:
    - .*\.test\.php$
    - .*Test\.php$

  layers:
    - name: TuiApplication
      collectors:
        - type: directory
          value: src/Tui/Application/.*

    - name: TuiLayout
      collectors:
        - type: directory
          value: src/Tui/Layout/.*

    - name: TuiExtension
      collectors:
        - type: directory
          value: src/Tui/Extension/.*

    - name: TuiHeader
      collectors:
        - type: directory
          value: src/Tui/Header/.*

    - name: TuiTranscript
      collectors:
        - type: directory
          value: src/Tui/Transcript/.*

    - name: TuiStatus
      collectors:
        - type: directory
          value: src/Tui/Status/.*

    - name: TuiCommand
      collectors:
        - type: directory
          value: src/Tui/Command/.*

    - name: TuiCompletion
      collectors:
        - type: directory
          value: src/Tui/Completion/.*

    - name: TuiPicker
      collectors:
        - type: directory
          value: src/Tui/Picker/.*

    - name: TuiEditor
      collectors:
        - type: directory
          value: src/Tui/Editor/.*

    - name: TuiFooter
      collectors:
        - type: directory
          value: src/Tui/Footer/.*

    - name: TuiWidget
      collectors:
        - type: directory
          value: src/Tui/Widget/.*

    - name: TuiListener
      collectors:
        - type: directory
          value: src/Tui/Listener/.*

    - name: TuiRuntime
      collectors:
        - type: directory
          value: src/Tui/Runtime/.*

    - name: TuiScreen
      collectors:
        - type: directory
          value: src/Tui/Screen/.*

    - name: TuiTheme
      collectors:
        - type: directory
          value: src/Tui/Theme/.*

    - name: TuiQuestion
      collectors:
        - type: directory
          value: src/Tui/Question/.*

    - name: TuiStartup
      collectors:
        - type: directory
          value: src/Tui/Startup/.*

    - name: TuiCompactHeader
      collectors:
        - type: directory
          value: src/Tui/CompactHeader/.*

    - name: TuiUtility
      collectors:
        - type: directory
          value: src/Tui/Utility/.*

    - name: TuiExport
      collectors:
        - type: directory
          value: src/Tui/Export/.*

    - name: AppRuntimeContract
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/(Contract|Protocol)/.*

    - name: AppLoadedResources
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/LoadedResources/.*

    - name: AppExtensionApi
      collectors:
        - type: directory
          value: src/CodingAgent/ExtensionApi/.*

    - name: HatfieldExtTaskWorkflow
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\HatfieldExt\\TaskWorkflow\\#'

    - name: HatfieldExtFileRewind
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\HatfieldExt\\FileRewind\\#'

    - name: AppExtensionBuiltin
      collectors:
        - type: classNameRegex
          value: '#Ineersa\\CodingAgent\\Extension\\Builtin\\#'

    - name: AppExtension
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\CodingAgent\\Extension\\(?!Builtin\\)#'

    - name: AppRuntimeInternals
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/(InProcess|Process|Stream|Controller|Messenger)/.*

    - name: AppRuntimeProjection
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/Projection/.*

    - name: AppRuntimeProjectionPipeline
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/ProjectionPipeline/.*

    - name: AppPromptTemplate
      collectors:
        - type: directory
          value: src/CodingAgent/PromptTemplate/.*

    - name: AppConfig
      collectors:
        - type: directory
          value: src/CodingAgent/Config/.*

    - name: AppSession
      collectors:
        - type: directory
          value: src/CodingAgent/Session/.*

    - name: AppCli
      collectors:
        - type: directory
          value: src/CodingAgent/CLI/.*

    - name: AppAuth
      collectors:
        - type: directory
          value: src/CodingAgent/Auth/.*

    - name: AppInfrastructureSymfonyAi
      collectors:
        - type: directory
          value: src/CodingAgent/Infrastructure/SymfonyAi/.*

    - name: AppProviderQuota
      collectors:
        - type: directory
          value: src/CodingAgent/Infrastructure/ProviderQuota/.*

    - name: AgentCore
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\\\AgentCore\\\\#i'

    - name: SymfonyTui
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Tui\\\\#i'

    - name: SymfonyEventDispatcher
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\(Component\\\\EventDispatcher\\\\|Contracts\\\\EventDispatcher\\)#i'

    - name: SymfonyConsole
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Console\\\\#i'

    - name: SymfonyMessenger
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Messenger\\\\#i'

    - name: SymfonyLock
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Lock\\\\#i'

    - name: SymfonyProcess
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Process\\\\#i'

    - name: SymfonyFinder
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Finder\\\\#i'

    - name: SymfonyScheduler
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Scheduler\\\\#i'

    - name: SymfonySerializer
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Serializer\\\\#i'

    - name: SymfonyValidator
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Validator\\\\#i'

    - name: SymfonyYaml
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\Component\\Yaml\\#i'

    - name: SymfonyAiPlatform
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\AI\\\\Platform\\\\#i'

    - name: SymfonyAiAgent
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\AI\\\\Agent\\\\#i'

    - name: SymfonyHttpClient
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\(Component\\\\HttpClient\\\\|Contracts\\\\HttpClient\\)#i'

    - name: ForbiddenHttp
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\Component\\HttpKernel\\#i'

    - name: ForbiddenCodingAgent
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\\\CodingAgent\\\\#i'

    - name: AppSystemPrompt
      collectors:
        - type: directory
          value: src/CodingAgent/SystemPrompt/.*

    - name: AppAgent
      collectors:
        - type: directory
          value: src/CodingAgent/Agent/.*

    - name: AppMarkdown
      collectors:
        - type: directory
          value: src/CodingAgent/Markdown/.*

    - name: AppSkills
      collectors:
        - type: directory
          value: src/CodingAgent/Skills/.*

    - name: AppTool
      collectors:
        - type: directory
          value: src/CodingAgent/Tool/.*

    - name: AppMcpConfig
      collectors:
        - type: directory
          value: src/CodingAgent/Mcp/Config/.*
    - name: AppMcpClient
      collectors:
        - type: directory
          value: src/CodingAgent/Mcp/Client/.*
    - name: AppMcpMessage
      collectors:
        - type: directory
          value: src/CodingAgent/Mcp/Message/.*
    - name: AppMcpBroker
      collectors:
        - type: directory
          value: src/CodingAgent/Mcp/Handler/.*
        - type: classNameRegex
          value: '#^Ineersa\\CodingAgent\\Mcp\\McpSessionLifecycleDispatcher$#'
    - name: AppMcpCatalog
      collectors:
        - type: directory
          value: src/CodingAgent/Mcp/Catalog/.*
    # AppMcpTool covers MCP-to-tool-registry bridging (Mcp/Tool/) and the
    # Messenger middleware that routes ExecuteToolCall to mcp transport
    # (Mcp/Messenger/).  Both live together because the middleware reads
    # the session MCP catalog to decide routing — it is an integral part
    # of the tool-layer wiring, not a generic broker concern.
    - name: AppMcpTool
      collectors:
        - type: directory
          value: src/CodingAgent/Mcp/Tool/.*
        - type: directory
          value: src/CodingAgent/Mcp/Messenger/.*
    - name: McpSdk
      collectors:
        - type: classNameRegex
          value: '#^Mcp\\\\#i'
  ruleset:
    TuiApplication:
      - AppRuntimeContract
      # Session transcript provider contract returns TranscriptBlock DTOs.
      - AppRuntimeProjection
      - AppSession
      - AppConfig
      - TuiLayout
      - TuiExtension
      - TuiListener
      - TuiRuntime
      - TuiScreen
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter
      - TuiWidget
      - TuiTheme
      - TuiQuestion
      - SymfonyTui
      - SymfonyConsole

    TuiListener:
      - TuiExport
      - AppExtensionApi
      - AppRuntimeContract
      - AppRuntimeProjection
      - AppSession
      - AppConfig
      - TuiImagePaste
      - TuiRuntime
      - TuiScreen
      - TuiLayout
      - TuiWidget
      - TuiTranscript
      - TuiCommand
      - TuiCompletion
      - TuiEditor
      - TuiPicker
      - TuiFooter
      - TuiQuestion
      - TuiTheme
      - TuiUtility
      - TuiCompactHeader
      - SymfonyTui

    TuiRuntime:
      - AppExtensionApi
      - AppRuntimeContract
      - AppRuntimeProjection
      - AppSession
      - TuiTranscript
      - TuiScreen
      - TuiTheme
      - TuiPicker
