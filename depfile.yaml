      - TuiTheme

    TuiTranscript:
      - AppRuntimeProjection
      - TuiWidget
      - TuiTheme
      - TuiFooter
      - SymfonyTui
      - SymfonyYaml

    TuiStatus:
      - TuiWidget
      - TuiTheme

    TuiExport:
      - TuiCommand

    TuiCommand:
      - TuiExtension

    TuiCompletion:
      - TuiCommand

    TuiPicker:
      - TuiExport
      - AppConfig
      - AppRuntimeContract
      - AppSession
      - TuiRuntime
      - TuiScreen
      - TuiListener
      - TuiEditor
      - TuiFooter
      - TuiTheme
      - SymfonyTui

    TuiEditor:
      - TuiWidget
      - TuiTheme
      - SymfonyTui

    TuiFooter:
      - TuiWidget
      - TuiTheme

    TuiStartup:
      - AppRuntimeContract
      - TuiTheme
      - TuiWidget

    TuiCompactHeader:
      - AppRuntimeContract
      - AppSkills
      - AppAgent
      - AppMcpCatalog
      - AppMcpConfig
      - TuiTheme
      - TuiWidget

    TuiWidget:
      - TuiTheme
      - SymfonyTui

    TuiTheme:
      - AppRuntimeContract
      - AppConfig
      - SymfonyTui
      - SymfonyConsole
      - SymfonyYaml

    TuiQuestion:
      - TuiRuntime
      - TuiScreen
      - TuiWidget
      - TuiTheme
      - SymfonyTui

    TuiUtility:
      - SymfonyProcess

    TuiImagePaste:
      - AppConfig
      - AppSession
      - TuiRuntime
      - TuiScreen
      - TuiTranscript
      - SymfonyProcess

    AppRuntimeInternals:
      - AppRuntimeContract
      - AppRuntimeProjection
      - AppExtensionApi
      - AppSystemPrompt
      - AppSkills
      - AppAgent
      - AppTool
      - AppPromptTemplate
      - AgentCore
      - AppConfig
      - AppMcpBroker
      - SymfonyConsole
      - SymfonyMessenger
      - SymfonyAiPlatform
      - SymfonyEventDispatcher

    AppLoadedResources:
      - AppRuntimeContract
      - AppSystemPrompt
      - AppSkills
      - AppPromptTemplate
      - AppAgent
      - AppExtension
      - AppConfig

    AppRuntimeContract:
      - AppRuntimeProjection
      - AgentCore
      - SymfonyConsole
      - SymfonyEventDispatcher

    AppPromptTemplate:
      - AppConfig
      - AppRuntimeContract
      - AppMarkdown
      - SymfonyYaml

    AppConfig:
      - AppSession
      - SymfonyTui
      - SymfonyConsole
      - SymfonyYaml

    AppAuth:
      - SymfonyConsole
      - SymfonyLock
      - SymfonyProcess

    AppInfrastructureSymfonyAi:
      - AppConfig
      - SymfonyAiPlatform
      - AppAuth

    # /usage provider probes: auth + catalog + HttpClient + sanitized Runtime/Contract DTOs.
    AppProviderQuota:
      - AppAuth
      - AppConfig
      - AppRuntimeContract
      - SymfonyHttpClient

    AppSession:
      - AgentCore
      - AppConfig
      - AppRuntimeContract
      - AppRuntimeProjection
      - SymfonyConsole
      - SymfonyLock
      - SymfonyYaml
      - SymfonySerializer

    AppCli:
      - AppAuth
      - AppExtension
      - AppExtensionApi
      - AppTool
      - AppRuntimeContract
      - AppRuntimeProjection
      - AppRuntimeProjectionPipeline
      - AppRuntimeInternals
      - AppSkills
      - AppPromptTemplate
      - AppSession
      - AppConfig
      - TuiApplication
      - TuiListener
      - TuiRuntime
      - TuiCompletion
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter
      - TuiLayout
      - TuiWidget
      - TuiTheme
      - SymfonyConsole
      - SymfonyLock
      - SymfonyFinder
      - SymfonyScheduler

    AppRuntimeProjectionPipeline:
