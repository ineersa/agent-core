      - AppRuntimeContract
      - SymfonyEventDispatcher

    AppRuntimeProjection: ~

    AppExtension:
      - AppExtensionApi
      - AppRuntimeContract
      - AppConfig
      - AppTool
      - AgentCore
      - SymfonyAiPlatform
      - SymfonyAiAgent
      - SymfonyEventDispatcher
      - SymfonyProcess

    AppAgent:
      - AppConfig
      - AppSystemPrompt
      - AppMarkdown
      - AppMcpCatalog
      - AppMcpConfig
      - TuiTheme
      - AppSession
      - AppRuntimeContract
      - AppSkills
      - AppTool
      - AgentCore
      - SymfonyYaml
      - SymfonySerializer
      - SymfonyValidator
      - SymfonyLock

    AppSkills:
