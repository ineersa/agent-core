      - AppMarkdown
      - SymfonyYaml

    AppSystemPrompt:
      - AppExtensionApi
      - AppTool
      - AppConfig
      - SymfonyAiPlatform

    AppTool:
      - AppExtensionApi
      - AgentCore
      - AppConfig
      - AppMarkdown
      - SymfonyFinder
      - SymfonyYaml
      - SymfonyAiPlatform
      - SymfonyEventDispatcher

    AppMcpConfig:
