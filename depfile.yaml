# Architecture dependency enforcement config for Deptrac.
#
# Run: vendor/bin/deptrac analyze --config-file=depfile.yaml
#
# These rules enforce the runtime boundary:
#   - TuiApplication may depend only on Runtime Contract/Protocol, TuiWidget, and Symfony TUI/Console.
#   - TuiWidget must not depend on CodingAgent or AgentCore.
#   - AgentCore must not depend on CodingAgent, Tui, Symfony TUI, HttpKernel, or FrameworkBundle.

parameters:
  paths:
    - ./src
  exclude_files:
    - .*\.test\.php$
    - .*Test\.php$

  layers:
    - name: TuiApplication
      collectors:
        - type: directory
          value: src/Tui/Application/.*

    - name: TuiWidget
      collectors:
        - type: directory
          value: src/Tui/Widget/.*

    - name: AppRuntimeContract
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/(Contract|Protocol)/.*

    - name: AppRuntimeInternals
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/(InProcess|Process)/.*

    - name: AppCli
      collectors:
        - type: directory
          value: src/CodingAgent/CLI/.*

    - name: AgentCore
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\\\AgentCore\\\\#i'

    - name: SymfonyTui
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Tui\\\\#i'

    - name: SymfonyConsole
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Console\\\\#i'

    - name: SymfonyMessenger
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Messenger\\\\#i'

    - name: ForbiddenHttp
      collectors:
        - type: classNameRegex
          value: '#^(Symfony\\\\Component\\\\HttpKernel|Symfony\\\\Bundle\\\\FrameworkBundle)\\\\#i'

  ruleset:
    TuiApplication:
      - AppRuntimeContract
      - TuiWidget
      - SymfonyTui
      - SymfonyConsole

    TuiWidget:
      - SymfonyTui
      - SymfonyConsole

    AppRuntimeInternals:
      - AppRuntimeContract
      - AgentCore
      - SymfonyConsole
      - SymfonyMessenger

    AppRuntimeContract:
      - AgentCore
      - SymfonyConsole

    AppCli:
      - AppRuntimeContract
      - AppRuntimeInternals
      - TuiApplication
      - SymfonyConsole

    AgentCore: ~
    SymfonyTui: ~
    SymfonyConsole: ~
    SymfonyMessenger: ~
    ForbiddenHttp: ~
