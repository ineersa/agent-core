    AppMcpMessage: ~

    AppMcpBroker:
      - AppMcpConfig
      - TuiTheme
      - AppMcpClient
      - AppMcpCatalog
      - AppMcpMessage
      - SymfonyMessenger

    AppMcpCatalog: ~

    AppMcpTool:
      - AgentCore
      - AppAgent
      - AppTool
      - AppMcpCatalog
      - AppMcpClient
      - AppMcpConfig
      - TuiTheme
      - SymfonyMessenger

    McpSdk: ~

    # ExtensionApi generic TUI contracts (Symfony\Component\Tui\*) — intentional public UI API.
    AppExtensionApi:
      - SymfonyTui
    HatfieldExtTaskWorkflow:
      - AppExtensionApi
      - HatfieldExtTaskWorkflow
    HatfieldExtFileRewind:
      - AppExtensionApi
      - SymfonyTui
    AppExtensionBuiltin:
      - AppExtensionApi
      - AppRuntimeContract
      - SymfonyYaml

    AgentCore:
      - SymfonyLock
      - SymfonySerializer
      - SymfonyAiPlatform
    SymfonyTui: ~
    SymfonyAiPlatform:
      - SymfonyEventDispatcher
      - SymfonyHttpClient
    SymfonyAiAgent:
      - SymfonyAiPlatform
    SymfonyEventDispatcher: ~
    SymfonyConsole: ~
    SymfonyMessenger: ~
    SymfonyLock: ~
    SymfonyProcess: ~
    SymfonyFinder: ~
    SymfonyScheduler: ~
    SymfonySerializer: ~
    SymfonyValidator: ~
    SymfonyYaml: ~
