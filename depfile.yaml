# Architecture dependency enforcement config for Deptrac.
#
# Run: vendor/bin/deptrac analyze --config-file=depfile.yaml
#
# These rules enforce the runtime boundary:
#   - TuiApplication may depend only on Runtime Contract/Protocol, Tui internals, and Symfony TUI/Console.
#   - TuiWidget and sub-widgets must not depend on CodingAgent or AgentCore.
#   - AgentCore must not depend on CodingAgent, Tui, Symfony TUI, HttpKernel, or FrameworkBundle.

parameters:
  paths:
    - ./src
  exclude_files:
    - .*\.test\.php$
    - .*Test\.php$

  layers:
    - name: TuiApplication
      collectors:
        - type: directory
          value: src/Tui/Application/.*

    - name: TuiLayout
      collectors:
        - type: directory
          value: src/Tui/Layout/.*

    - name: TuiExtension
      collectors:
        - type: directory
          value: src/Tui/Extension/.*

    - name: TuiHeader
      collectors:
        - type: directory
          value: src/Tui/Header/.*

    - name: TuiTranscript
      collectors:
        - type: directory
          value: src/Tui/Transcript/.*

    - name: TuiStatus
      collectors:
        - type: directory
          value: src/Tui/Status/.*

    - name: TuiEditor
      collectors:
        - type: directory
          value: src/Tui/Editor/.*

    - name: TuiFooter
      collectors:
        - type: directory
          value: src/Tui/Footer/.*

    - name: TuiWidget
      collectors:
        - type: directory
          value: src/Tui/Widget/.*

    - name: TuiTheme
      collectors:
        - type: directory
          value: src/Tui/Theme/.*

    - name: AppRuntimeContract
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/(Contract|Protocol)/.*

    - name: AppRuntimeInternals
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/(InProcess|Process)/.*

    - name: AppConfig
      collectors:
        - type: directory
          value: src/CodingAgent/Config/.*

    - name: AppCli
      collectors:
        - type: directory
          value: src/CodingAgent/CLI/.*

    - name: AgentCore
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\\\AgentCore\\\\#i'

    - name: SymfonyTui
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Tui\\\\#i'

    - name: SymfonyConsole
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Console\\\\#i'

    - name: SymfonyMessenger
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Messenger\\\\#i'

    - name: SymfonyYaml
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\Component\\Yaml\\#i'

    - name: ForbiddenHttp
      collectors:
        - type: classNameRegex
          value: '#^(Symfony\\\\Component\\\\HttpKernel|Symfony\\\\Bundle\\\\FrameworkBundle)\\\\#i'

  ruleset:
    TuiApplication:
      - AppRuntimeContract
      - AppConfig
      - TuiLayout
      - TuiExtension
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter
      - TuiWidget
      - TuiTheme
      - SymfonyTui
      - SymfonyConsole

    TuiLayout:
      - TuiWidget
      - TuiTheme
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter

    TuiExtension:
      - TuiLayout
      - TuiWidget
      - TuiTheme

    TuiHeader:
      - TuiWidget
      - TuiTheme

    TuiTranscript:
      - TuiWidget
      - TuiTheme

    TuiStatus:
      - TuiWidget
      - TuiTheme

    TuiEditor:
      - TuiWidget
      - TuiTheme

    TuiFooter:
      - TuiWidget
      - TuiTheme

    TuiWidget:
      - TuiTheme

    TuiTheme:
      - SymfonyTui
      - SymfonyConsole
      - SymfonyYaml

    AppRuntimeInternals:
      - AppRuntimeContract
      - AgentCore
      - SymfonyConsole
      - SymfonyMessenger

    AppRuntimeContract:
      - AgentCore
      - SymfonyConsole

    AppConfig:
      - SymfonyTui
      - SymfonyConsole
      - SymfonyYaml

    AppCli:
      - AppRuntimeContract
      - AppRuntimeInternals
      - TuiApplication
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter
      - TuiLayout
      - TuiWidget
      - TuiTheme
      - SymfonyConsole

    AgentCore: ~
    SymfonyTui: ~
    SymfonyConsole: ~
    SymfonyMessenger: ~
    SymfonyYaml: ~
    ForbiddenHttp: ~
