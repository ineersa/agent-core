# Architecture dependency enforcement config for Deptrac.
#
# Run: vendor/bin/deptrac analyze --config-file=depfile.yaml
#
# These rules enforce the runtime boundary:
#   - TuiApplication may depend only on Runtime Contract/Protocol, Session, Tui internals, and Symfony TUI/Console.
#   - TuiWidget and sub-widgets must not depend on CodingAgent or AgentCore.
#   - AgentCore must not depend on CodingAgent, Tui, Symfony TUI, HttpKernel, or FrameworkBundle.

parameters:
  paths:
    - ./src
  exclude_files:
    - .*\.test\.php$
    - .*Test\.php$

  layers:
    - name: TuiApplication
      collectors:
        - type: directory
          value: src/Tui/Application/.*

    - name: TuiLayout
      collectors:
        - type: directory
          value: src/Tui/Layout/.*

    - name: TuiExtension
      collectors:
        - type: directory
          value: src/Tui/Extension/.*

    - name: TuiHeader
      collectors:
        - type: directory
          value: src/Tui/Header/.*

    - name: TuiTranscript
      collectors:
        - type: directory
          value: src/Tui/Transcript/.*

    - name: TuiStatus
      collectors:
        - type: directory
          value: src/Tui/Status/.*

    - name: TuiCommand
      collectors:
        - type: directory
          value: src/Tui/Command/.*

    - name: TuiPicker
      collectors:
        - type: directory
          value: src/Tui/Picker/.*

    - name: TuiEditor
      collectors:
        - type: directory
          value: src/Tui/Editor/.*

    - name: TuiFooter
      collectors:
        - type: directory
          value: src/Tui/Footer/.*

    - name: TuiWidget
      collectors:
        - type: directory
          value: src/Tui/Widget/.*

    - name: TuiListener
      collectors:
        - type: directory
          value: src/Tui/Listener/.*

    - name: TuiRuntime
      collectors:
        - type: directory
          value: src/Tui/Runtime/.*

    - name: TuiScreen
      collectors:
        - type: directory
          value: src/Tui/Screen/.*

    - name: TuiTheme
      collectors:
        - type: directory
          value: src/Tui/Theme/.*

    - name: AppRuntimeContract
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/(Contract|Protocol)/.*

    - name: AppExtensionApi
      collectors:
        - type: directory
          value: src/CodingAgent/ExtensionApi/.*

    - name: AppExtension
      collectors:
        - type: directory
          value: src/CodingAgent/Extension/.*

    - name: AppRuntimeInternals
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/(InProcess|Process|Stream|Mapping|Controller)/.*

    - name: AppRuntimeProjection
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/Projection/.*

    - name: AppRuntimeProjectionPipeline
      collectors:
        - type: directory
          value: src/CodingAgent/Runtime/ProjectionPipeline/.*

    - name: AppConfig
      collectors:
        - type: directory
          value: src/CodingAgent/Config/.*

    - name: AppSession
      collectors:
        - type: directory
          value: src/CodingAgent/Session/.*

    - name: AppCli
      collectors:
        - type: directory
          value: src/CodingAgent/CLI/.*

    - name: AppInfrastructureSymfonyAi
      collectors:
        - type: directory
          value: src/CodingAgent/Infrastructure/SymfonyAi/.*

    - name: AgentCore
      collectors:
        - type: classNameRegex
          value: '#^Ineersa\\\\AgentCore\\\\#i'

    - name: SymfonyTui
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Tui\\\\#i'

    - name: SymfonyEventDispatcher
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\(Component\\\\EventDispatcher\\\\|Contracts\\\\EventDispatcher\\)#i'

    - name: SymfonyConsole
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Console\\\\#i'

    - name: SymfonyMessenger
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Messenger\\\\#i'

    - name: SymfonyLock
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Lock\\\\#i'

    - name: SymfonySerializer
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\Component\\\\Serializer\\\\#i'

    - name: SymfonyYaml
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\Component\\Yaml\\#i'

    - name: SymfonyAiPlatform
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\\\AI\\\\Platform\\\\#i'

    - name: ForbiddenHttp
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\Component\\HttpKernel\\#i'

    - name: AppTool
      collectors:
        - type: directory
          value: src/CodingAgent/Tool/.*

  ruleset:
    TuiApplication:
      - AppRuntimeContract
      - AppRuntimeProjection
      - AppSession
      - AppConfig
      - TuiLayout
      - TuiExtension
      - TuiListener
      - TuiRuntime
      - TuiScreen
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter
      - TuiWidget
      - TuiTheme
      - SymfonyTui
      - SymfonyConsole

    TuiListener:
      - AppRuntimeContract
      - AppRuntimeProjection
      - AppSession
      - AppConfig
      - TuiRuntime
      - TuiScreen
      - TuiTranscript
      - TuiCommand
      - TuiPicker
      - TuiFooter
      - TuiTheme
      - SymfonyTui

    TuiRuntime:
      - AppRuntimeContract
      - AppRuntimeProjection
      - AppSession
      - TuiTranscript
      - TuiScreen
      - TuiTheme
      - SymfonyTui

    TuiScreen:
      - TuiLayout
      - TuiExtension
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter
      - TuiWidget
      - TuiTheme
      - SymfonyTui

    TuiLayout:
      - TuiWidget
      - TuiTheme
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter

    TuiExtension:
      - TuiLayout
      - TuiWidget
      - TuiFooter
      - TuiTheme

    TuiHeader:
      - TuiWidget
      - TuiTheme

    TuiTranscript:
      - AppRuntimeProjection
      - TuiWidget
      - TuiTheme

    TuiStatus:
      - TuiWidget
      - TuiTheme

    TuiCommand: ~

    TuiPicker:
      - AppConfig
      - TuiRuntime
      - TuiScreen
      - TuiListener
      - TuiEditor
      - TuiFooter
      - TuiTheme
      - SymfonyTui

    TuiEditor:
      - TuiWidget
      - TuiTheme
      - SymfonyTui

    TuiFooter:
      - TuiWidget
      - TuiTheme

    TuiWidget:
      - TuiTheme
      - SymfonyTui

    TuiTheme:
      - AppConfig
      - SymfonyTui
      - SymfonyConsole
      - SymfonyYaml

    AppRuntimeInternals:
      - AppRuntimeContract
      - AppRuntimeProjection
      - AppExtensionApi
      - AppTool
      - AgentCore
      - AppConfig
      - SymfonyConsole
      - SymfonyMessenger
      - SymfonyAiPlatform
      - SymfonyEventDispatcher

    AppRuntimeContract:
      - AppRuntimeProjection
      - AgentCore
      - SymfonyConsole
      - SymfonyEventDispatcher

    AppConfig:
      - AppSession
      - SymfonyTui
      - SymfonyConsole
      - SymfonyYaml

    AppInfrastructureSymfonyAi:
      - AppConfig
      - SymfonyAiPlatform

    AppSession:
      - AgentCore
      - AppConfig
      - SymfonyConsole
      - SymfonyLock
      - SymfonyYaml
      - SymfonySerializer

    AppCli:
      - AppExtension
      - AppExtensionApi
      - AppTool
      - AppRuntimeContract
      - AppRuntimeProjection
      - AppRuntimeProjectionPipeline
      - AppRuntimeInternals
      - AppSession
      - TuiApplication
      - TuiListener
      - TuiHeader
      - TuiTranscript
      - TuiStatus
      - TuiEditor
      - TuiFooter
      - TuiLayout
      - TuiWidget
      - TuiTheme
      - SymfonyConsole

    AppRuntimeProjectionPipeline:
      - AppRuntimeProjection
      - AppRuntimeContract
      - SymfonyEventDispatcher

    AppRuntimeProjection: ~

    AppExtension:
      - AppExtensionApi
      - AppConfig

    AppTool:
      - AgentCore
      - SymfonyAiPlatform

    AppExtensionApi: ~

    AgentCore:
      - SymfonyLock
      - SymfonySerializer
      - SymfonyAiPlatform
    SymfonyTui: ~
    SymfonyAiPlatform: ~
    SymfonyEventDispatcher: ~
    SymfonyConsole: ~
    SymfonyMessenger: ~
    SymfonyLock: ~
    SymfonySerializer: ~
    SymfonyYaml: ~
    ForbiddenHttp: ~
