tui:
    theme: cyberpunk
tools:
    bash:
        background_prompt_threshold_seconds: 15
logging:
    level: info
    max_files: 2
ai:
    providers:
        deepseek:
            type: generic
            enabled: true
            base_url: 'https://api.deepseek.com'
            api: openai-completions
            api_key: 'env:DEEPSEEK_API_KEY'
            completions_path: /chat/completions
            supports_completions: true
            supports_embeddings: false
            compatibility: { thinking_format: deepseek, requires_reasoning_content_on_assistant_messages: true }
            models: { deepseek-v4-pro: { name: 'DeepSeek V4 Pro', context_window: 1000000, max_tokens: 384000, input: [text], tool_calling: true, reasoning: true, thinking_level_map: { minimal: high, low: high, medium: high, high: high, xhigh: max }, cost: { input: 0.435, output: 0.87, cache_read: 0.003625, cache_write: 0 } }, deepseek-v4-flash: { name: 'DeepSeek V4 Flash', context_window: 1000000, max_tokens: 384000, input: [text], tool_calling: true, reasoning: true, thinking_level_map: { minimal: high, low: high, medium: high, high: high, xhigh: max }, cost: { input: 0.14, output: 0.28, cache_read: 0.0028, cache_write: 0 } } }
        llama_cpp:
            type: generic
            enabled: true
            base_url: 'http://192.168.2.38:8052/v1'
            api: openai-completions
            api_key: dummy
            completions_path: /chat/completions
            embeddings_path: /embeddings
            supports_completions: true
            supports_embeddings: false
            supports_thinking_levels: false
            models: { flash: { name: flash, context_window: 200000, max_tokens: 65536, input: [text, image], tool_calling: true, reasoning: true, cost: { input: 0, output: 0, cache_read: 0, cache_write: 0 } } }
        llama_cpp_test:
            type: generic
            enabled: true
            base_url: 'http://192.168.2.38:9052/v1'
            api: openai-completions
            api_key: dummy
            completions_path: /chat/completions
            embeddings_path: /embeddings
            supports_completions: true
            supports_embeddings: false
            supports_thinking_levels: false
            models: { test: { name: test, context_window: 32768, max_tokens: 32768, input: [text, image], tool_calling: true, reasoning: false, cost: { input: 1000.0, output: 100000.0, cache_read: 0, cache_write: 0 } } }
        zai:
            type: generic
            enabled: true
            base_url: 'https://api.z.ai/api/coding/paas/v4'
            api: openai-completions
            api_key: 'env:ZAI_API_KEY'
            completions_path: /chat/completions
            supports_completions: true
            supports_embeddings: false
            compatibility: { supports_developer_role: false, supports_reasoning_effort: false, thinking_format: zai }
            models: { glm-5.1: { name: 'GLM 5.1', context_window: 200000, max_tokens: 131072, input: [text], tool_calling: true, reasoning: true, thinking_level_map: { minimal: enabled, low: enabled, medium: enabled, high: enabled }, compatibility: { zai_tool_stream: true }, cost: { input: 0, output: 0, cache_read: 0, cache_write: 0 } }, glm-5v-turbo: { name: 'GLM 5V Turbo', context_window: 200000, max_tokens: 131072, input: [text, image], tool_calling: true, reasoning: true, thinking_level_map: { minimal: enabled, low: enabled, medium: enabled, high: enabled }, compatibility: { zai_tool_stream: true }, cost: { input: 0, output: 0, cache_read: 0, cache_write: 0 } }, glm-5.2: { name: 'GLM 5.2', context_window: 1000000, max_tokens: 131072, input: [text], tool_calling: true, reasoning: true, thinking_level_map: { minimal: null, low: high, medium: high, high: high, xhigh: max }, compatibility: { supports_reasoning_effort: true, zai_tool_stream: true }, cost: { input: 0, output: 0, cache_read: 0, cache_write: 0 } } }
        openai-codex:
            type: codex
            transport: websocket-cached
            websocket_cache_idle_ttl_seconds: 300
            websocket_cache_max_age_seconds: 3300
            enabled: true
            base_url: 'https://chatgpt.com/backend-api'
            api: openai-responses
            completions_path: /codex/responses
            supports_completions: true
            supports_embeddings: false
            supports_thinking_levels: true
            compatibility: { supports_developer_role: false, supports_reasoning_effort: false, thinking_format: codex }
            models: { gpt-5.6-luna: { name: 'GPT-5.6 Luna', reasoning: true, thinking_level_map: { minimal: low, low: low, medium: medium, high: high, xhigh: xhigh, max: max }, tool_calling: true, input: [text, image], context_window: 372000, max_tokens: 128000, cost: { input: 1.0, output: 6.0, cache_read: 0.1, cache_write: 1.25 } }, gpt-5.6-sol: { name: 'GPT-5.6 Sol', reasoning: true, thinking_level_map: { minimal: low, low: low, medium: medium, high: high, xhigh: xhigh, max: max }, tool_calling: true, input: [text, image], context_window: 372000, max_tokens: 128000, cost: { input: 5.0, output: 30.0, cache_read: 0.5, cache_write: 6.25 } }, gpt-5.6-terra: { name: 'GPT-5.6 Terra', reasoning: true, thinking_level_map: { minimal: low, low: low, medium: medium, high: high, xhigh: xhigh, max: max }, tool_calling: true, input: [text, image], context_window: 372000, max_tokens: 128000, cost: { input: 2.5, output: 15.0, cache_read: 0.25, cache_write: 3.125 } } }
extensions:
    enabled:
        - Ineersa\CodingAgent\Extension\Builtin\SafeGuard\SafeGuardExtension
        - Ineersa\HatfieldExt\TaskWorkflow\TaskWorkflowExtension
        - Ineersa\HatfieldExt\FileRewind\FileRewindExtension
        - Ineersa\HatfieldExt\CastorLlmMode\CastorLlmModeExtension
    settings:
        task_workflow:
            task_root: /home/ineersa/projects/agent-core-tasks
            castor_check_timeout_seconds: 480
        castor_llm_mode:
            enabled: true
forks:
    model: openai-codex/gpt-5.6-luna
    thinking_level: high
